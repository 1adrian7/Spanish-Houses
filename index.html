<style>
:root{--cream:#F8F9FB;--dark:#2563A8;--gold:#FFB347;--gold-light:#FFD49A;--warm-gray:#8A96A3;--border:rgba(37,99,168,0.12);--card-bg:#FFFFFF;--font-serif:'Outfit',sans-serif;--font-sans:'Plus Jakarta Sans',sans-serif;--shadow:0 2px 16px rgba(37,99,168,0.08);--shadow-lg:0 8px 40px rgba(37,99,168,0.12);--transition:all 0.35s cubic-bezier(0.25,0.46,0.45,0.94);--success:#2D6A4F;--danger:#9B2C2C;}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--font-sans);background:var(--cream);color:var(--dark);min-height:100vh;overflow-x:hidden;}
#root{min-height:100vh;}
/* LOADER */
.loader-overlay{position:fixed;inset:0;background:var(--dark);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;animation:loaderFade 0.6s ease 1.8s forwards;}
.loader-logo{font-family:var(--font-serif);font-size:48px;font-weight:300;color:var(--cream);letter-spacing:0.15em;opacity:0;animation:logoReveal 0.8s ease 0.3s forwards;}
.loader-line{width:0;height:1px;background:var(--gold);margin-top:16px;animation:lineGrow 1s ease 0.8s forwards;}
.loader-sub{font-size:11px;letter-spacing:0.3em;color:var(--warm-gray);margin-top:12px;text-transform:uppercase;opacity:0;animation:logoReveal 0.8s ease 1.2s forwards;}
@keyframes logoReveal{to{opacity:1;}}
@keyframes lineGrow{to{width:120px;}}
@keyframes loaderFade{to{opacity:0;pointer-events:none;}}
/* NAVBAR */
.navbar{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 2.5rem;height:68px;display:flex;align-items:center;justify-content:space-between;background:rgba(245,240,232,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);transition:var(--transition);}
.navbar.scrolled{height:56px;background:rgba(245,240,232,0.98);}
.nav-logo{font-family:var(--font-serif);font-size:22px;font-weight:300;letter-spacing:0.12em;cursor:pointer;display:flex;align-items:center;gap:8px;}
.nav-logo-dot{width:6px;height:6px;background:var(--gold);border-radius:50%;}
.nav-links{display:flex;align-items:center;gap:2rem;}
.nav-link{font-size:13px;letter-spacing:0.06em;color:var(--warm-gray);cursor:pointer;text-decoration:none;transition:color 0.2s;background:none;border:none;font-family:var(--font-sans);}
.nav-link:hover,.nav-link.active{color:var(--dark);}
.nav-fav-btn{position:relative;background:none;border:none;cursor:pointer;padding:6px;}
.nav-fav-badge{position:absolute;top:0;right:0;background:var(--gold);color:white;font-size:9px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:500;}
.nav-cta{background:var(--dark);color:var(--cream);border:none;padding:0.5rem 1.25rem;font-size:12px;letter-spacing:0.08em;cursor:pointer;font-family:var(--font-sans);transition:var(--transition);border-radius:6px;}
.nav-cta:hover{background:var(--gold);}
.nav-user-btn{display:flex;align-items:center;gap:8px;background:none;border:1px solid var(--border);padding:6px 12px;cursor:pointer;font-family:var(--font-sans);font-size:12px;color:var(--dark);transition:var(--transition);}
.nav-user-btn:hover{border-color:var(--gold);}
.nav-avatar{width:28px;height:28px;border-radius:50%;background:var(--dark);color:var(--cream);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;}
/* PAGES */
.page{min-height:100vh;padding-top:68px;animation:pageIn 0.5s ease;}
@media(max-width:600px){.page{padding-top:60px;}}
@keyframes pageIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
/* HERO */

.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom, rgba(28,43,58,0.45) 0%, rgba(28,43,58,0.55) 100%);}
.hero-grid{display:none;}
.hero-accent{display:none;}
.hero-accent2{display:none;}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.05);opacity:0.6;}}
.hero-content{position:relative;z-index:2;padding:0 2.5rem 5rem;max-width:900px;width:100%;}
.hero-tag{font-size:11px;letter-spacing:0.3em;color:var(--gold);text-transform:uppercase;margin-bottom:1rem;text-align:center;}
.hero-title{font-family:var(--font-serif);font-size:clamp(38px,5.5vw,72px);font-weight:300;color:var(--cream);line-height:1.15;margin-bottom:1.5rem;}
.hero-title em{font-style:italic;color:var(--gold-light);display:block;}
.hero-subtitle{font-size:15px;color:rgba(245,240,232,0.75);max-width:580px;line-height:1.8;margin-bottom:2.5rem;}
.hero-actions{display:flex;gap:1rem;flex-wrap:wrap;}
.btn-hero{padding:0.9rem 2.2rem;font-size:13px;letter-spacing:0.1em;cursor:pointer;font-family:var(--font-sans);transition:var(--transition);border:none;text-transform:uppercase;border-radius:6px;}
.btn-hero-primary{background:var(--gold);color:var(--dark);}
.btn-hero-primary:hover{background:var(--gold-light);transform:translateY(-1px);}
.btn-hero-outline{background:transparent;color:var(--cream);border:1px solid rgba(245,240,232,0.3);}
.btn-hero-outline:hover{border-color:var(--cream);background:rgba(245,240,232,0.05);}
.hero-stats{display:flex;gap:3rem;margin-top:4rem;padding-top:2rem;border-top:1px solid rgba(245,240,232,0.1);}
.hero-stat-num{font-family:var(--font-serif);font-size:32px;font-weight:300;color:var(--cream);}
.hero-stat-label{font-size:11px;letter-spacing:0.2em;color:rgba(245,240,232,0.4);text-transform:uppercase;margin-top:4px;}
/* CATALOGUE */
.catalogue{padding:3rem 2.5rem;max-width:1400px;margin:0 auto;}
.catalogue-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:2.5rem;}
.catalogue-title{font-family:var(--font-serif);font-size:40px;font-weight:300;}
.catalogue-title span{font-style:italic;color:var(--warm-gray);}
.result-count{font-size:13px;color:var(--warm-gray);}
/* FILTERS */
.filters-bar{display:flex;gap:0.75rem;margin-bottom:2rem;flex-wrap:wrap;align-items:center;padding:1.25rem 1.5rem;background:var(--card-bg);border:1px solid var(--border);}
.filter-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:130px;}
.filter-label{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--warm-gray);}
.filter-select{border:none;border-bottom:1px solid var(--border);background:transparent;font-family:var(--font-sans);font-size:13px;color:var(--dark);padding:4px 0;cursor:pointer;outline:none;appearance:none;}
.filter-search{flex:2;min-width:200px;}
.filter-search input{width:100%;border:none;border-bottom:1px solid var(--border);background:transparent;font-family:var(--font-sans);font-size:13px;padding:4px 0;outline:none;color:var(--dark);}
.filter-search input::placeholder{color:var(--warm-gray);}
.filter-btn-apply{background:var(--dark);color:var(--cream);border:none;padding:0.6rem 1.5rem;font-size:12px;letter-spacing:0.1em;cursor:pointer;font-family:var(--font-sans);text-transform:uppercase;transition:var(--transition);flex-shrink:0;border-radius:6px;}
.filter-btn-apply:hover{background:var(--gold);color:var(--dark);}
.filter-btn-clear{background:none;border:1px solid var(--border);color:var(--warm-gray);padding:0.6rem 1rem;font-size:12px;cursor:pointer;font-family:var(--font-sans);transition:var(--transition);flex-shrink:0;border-radius:6px;}
.filter-btn-clear:hover{border-color:var(--dark);color:var(--dark);}
/* CARDS */
.properties-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1.5rem;}
.property-card{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;overflow:hidden;transition:var(--transition);animation:cardIn 0.5s ease both;}
.property-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:var(--gold-light);}
@keyframes cardIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.card-img-wrap{position:relative;height:220px;overflow:hidden;background:#2C2318;border-radius:8px 8px 0 0;}
.card-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;transition:transform 0.6s ease;font-size:60px;}
.property-card:hover .card-img-placeholder{transform:scale(1.04);}
.card-badge{position:absolute;top:16px;left:16px;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;padding:4px 12px;font-weight:500;}
.badge-venta{background:var(--dark);color:var(--cream);}
.badge-alquiler{background:var(--gold);color:var(--dark);}
.badge-nuevo{background:#2D6A4F;color:white;}
.card-fav{position:absolute;top:14px;right:14px;background:rgba(245,240,232,0.9);border:none;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:var(--transition);border-radius:50%;font-size:15px;}
.card-fav:hover,.card-fav.active{background:var(--dark);}
.card-360{position:absolute;bottom:12px;right:12px;background:rgba(26,23,20,0.7);color:var(--cream);font-size:10px;letter-spacing:0.1em;padding:4px 10px;}
.card-body{padding:1.25rem 1.5rem 1.5rem;}
.card-price{font-family:var(--font-serif);font-size:26px;font-weight:300;margin-bottom:4px;}
.card-price-sub{font-size:11px;color:var(--warm-gray);margin-bottom:0.75rem;letter-spacing:0.05em;}
.card-title{font-size:14px;font-weight:500;margin-bottom:4px;}
.card-location{font-size:12px;color:var(--warm-gray);margin-bottom:1rem;display:flex;align-items:center;gap:4px;}
.card-details{display:flex;gap:1rem;font-size:12px;color:var(--warm-gray);padding-top:1rem;border-top:1px solid var(--border);}
.card-actions{display:flex;gap:8px;margin-top:1rem;}
.card-btn{flex:1;padding:0.6rem;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;font-family:var(--font-sans);border:1px solid var(--border);background:none;color:var(--dark);transition:var(--transition);border-radius:6px;}
.card-btn:hover{background:var(--dark);color:var(--cream);border-color:var(--dark);}
.card-btn-primary{background:var(--dark);color:var(--cream);border-color:var(--dark);border-radius:6px;}
.card-btn-primary:hover{background:var(--gold);border-color:var(--gold);color:var(--dark);}
/* DETAIL */
.detail-page{max-width:1400px;margin:0 auto;padding:2rem 2.5rem 4rem;}
.detail-back{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--warm-gray);cursor:pointer;border:none;background:none;font-family:var(--font-sans);padding:0;margin-bottom:2rem;transition:color 0.2s;}
.detail-back:hover{color:var(--dark);}
.detail-grid{display:grid;grid-template-columns:1fr 380px;gap:3rem;align-items:start;}
.gallery-main{position:relative;height:520px;background:#2C2318;overflow:hidden;margin-bottom:1rem;}
.gallery-main-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.gallery-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(245,240,232,0.9);border:none;width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:var(--transition);z-index:2;}
.gallery-nav:hover{background:var(--cream);}
.gallery-prev{left:16px;}
.gallery-next{right:16px;}
.gallery-counter{position:absolute;bottom:16px;right:16px;background:rgba(26,23,20,0.65);color:var(--cream);font-size:11px;padding:4px 12px;letter-spacing:0.1em;}
.gallery-360-btn{position:absolute;bottom:16px;left:16px;background:var(--gold);color:var(--dark);border:none;padding:8px 16px;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;font-family:var(--font-sans);font-weight:500;transition:var(--transition);display:flex;align-items:center;gap:6px;}
.gallery-360-btn:hover{background:var(--gold-light);}
.gallery-thumbs{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;}
.gallery-thumb{width:80px;height:60px;flex-shrink:0;cursor:pointer;border:2px solid transparent;transition:border-color 0.2s;background:#2C2318;display:flex;align-items:center;justify-content:center;font-size:24px;}
.gallery-thumb.active{border-color:var(--gold);}
.gallery-thumb:hover{border-color:var(--dark);}
/* DETAIL SIDEBAR */
.detail-sidebar{display:flex;flex-direction:column;gap:1.5rem;}
.detail-price-card{background:var(--dark);color:var(--cream);padding:2rem;}
.detail-badge{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:0.5rem;}
.detail-price{font-family:var(--font-serif);font-size:42px;font-weight:300;line-height:1;margin-bottom:0.25rem;}
.detail-price-note{font-size:12px;color:rgba(245,240,232,0.5);margin-bottom:1.5rem;}
.detail-cta{width:100%;background:var(--gold);color:var(--dark);border:none;padding:1rem;font-size:12px;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;font-family:var(--font-sans);font-weight:500;margin-bottom:0.75rem;transition:var(--transition);border-radius:6px;}
.detail-cta:hover{background:var(--gold-light);}
.detail-cta-outline{background:transparent;border:1px solid rgba(245,240,232,0.25);color:var(--cream);border-radius:6px;}
.detail-cta-outline:hover{border-color:var(--cream);background:rgba(245,240,232,0.05);}
.detail-info-card{background:var(--card-bg);border:1px solid var(--border);padding:1.5rem;}
.detail-info-title{font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--warm-gray);margin-bottom:1rem;}
.detail-info-row{display:flex;justify-content:space-between;align-items:center;padding:0.6rem 0;border-bottom:1px solid var(--border);font-size:13px;}
.detail-info-row:last-child{border-bottom:none;}
.detail-info-label{color:var(--warm-gray);}
.detail-info-value{font-weight:500;}
.detail-agent-card{background:var(--card-bg);border:1px solid var(--border);padding:1.5rem;display:flex;align-items:center;gap:1rem;}
.agent-avatar{width:52px;height:52px;border-radius:50%;background:var(--dark);display:flex;align-items:center;justify-content:center;font-family:var(--font-serif);font-size:20px;font-weight:300;color:var(--cream);flex-shrink:0;}
.agent-name{font-weight:500;font-size:14px;margin-bottom:2px;}
.agent-role{font-size:11px;color:var(--warm-gray);}
.agent-phone{font-size:12px;color:var(--gold);margin-top:6px;}
.detail-title{font-family:var(--font-serif);font-size:36px;font-weight:300;margin-bottom:0.5rem;line-height:1.2;}
.detail-location{font-size:14px;color:var(--warm-gray);margin-bottom:1.5rem;display:flex;align-items:center;gap:6px;}
.detail-features{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);margin-bottom:2rem;}
.detail-feature{background:var(--card-bg);padding:1.25rem;text-align:center;}
.detail-feature-icon{font-size:20px;margin-bottom:6px;}
.detail-feature-value{font-family:var(--font-serif);font-size:22px;font-weight:300;}
.detail-feature-label{font-size:10px;letter-spacing:0.1em;color:var(--warm-gray);text-transform:uppercase;margin-top:2px;}
.detail-section-title{font-family:var(--font-serif);font-size:22px;font-weight:300;margin-bottom:1rem;padding-top:2rem;border-top:1px solid var(--border);}
.detail-desc{font-size:14px;line-height:1.8;color:#4A4540;max-width:640px;margin-bottom:1.5rem;}
.amenities-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:2rem;}
.amenity{display:flex;align-items:center;gap:8px;font-size:13px;padding:0.6rem 0;}
.amenity-check{width:18px;height:18px;background:var(--dark);display:flex;align-items:center;justify-content:center;color:var(--cream);font-size:10px;flex-shrink:0;}
/* MAP */
.detail-map{height:240px;background:linear-gradient(135deg,#E8E0D0,#D4C9B8);position:relative;overflow:hidden;border:1px solid var(--border);}
.map-grid{position:absolute;inset:0;opacity:0.5;background-image:linear-gradient(rgba(26,23,20,0.1) 1px,transparent 1px),linear-gradient(90deg,rgba(26,23,20,0.1) 1px,transparent 1px);background-size:40px 40px;}
.map-pin{position:absolute;top:50%;left:50%;transform:translate(-50%,-100%);font-size:32px;animation:mapBounce 1s ease 0.5s both;}
@keyframes mapBounce{from{transform:translate(-50%,-80%) scale(0);opacity:0;}to{transform:translate(-50%,-100%) scale(1);opacity:1;}}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.map-label{position:absolute;top:50%;left:50%;transform:translate(-50%,10px);background:var(--dark);color:var(--cream);font-size:11px;letter-spacing:0.1em;padding:4px 12px;white-space:nowrap;}

/* FAVOURITES */
.favs-page{max-width:1400px;margin:0 auto;padding:3rem 2.5rem;}
.favs-title{font-family:var(--font-serif);font-size:40px;font-weight:300;margin-bottom:2rem;}
.favs-empty{text-align:center;padding:5rem 2rem;}
.favs-empty-icon{font-size:60px;margin-bottom:1rem;opacity:0.3;}
.favs-empty-text{font-family:var(--font-serif);font-size:24px;font-weight:300;color:var(--warm-gray);margin-bottom:0.5rem;}
.favs-empty-sub{font-size:14px;color:var(--warm-gray);margin-bottom:2rem;}
.btn-outline{background:none;border:1px solid var(--dark);color:var(--dark);padding:0.75rem 2rem;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;font-family:var(--font-sans);transition:var(--transition);border-radius:6px;}
.btn-outline:hover{background:var(--dark);color:var(--cream);}
/* TOAST */
.toast-container{position:fixed;bottom:2rem;right:2rem;z-index:500;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{background:var(--dark);color:var(--cream);padding:0.75rem 1.25rem;font-size:13px;letter-spacing:0.05em;display:flex;align-items:center;gap:10px;animation:toastIn 0.3s ease,toastOut 0.3s ease 2.7s forwards;pointer-events:all;min-width:260px;}
@keyframes toastIn{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
@keyframes toastOut{to{transform:translateY(20px);opacity:0;}}
.toast-icon{font-size:16px;flex-shrink:0;}
.toast-gold{background:var(--gold);color:var(--dark);}
/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:300;background:rgba(26,23,20,0.7);display:flex;align-items:center;justify-content:center;padding:1rem;animation:fadeIn 0.2s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal{background:var(--cream);max-width:480px;width:100%;padding:2.5rem;animation:modalIn 0.3s ease;position:relative;max-height:90vh;overflow-y:auto;}
@keyframes modalIn{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-close{position:absolute;top:1.25rem;right:1.25rem;background:none;border:none;font-size:20px;cursor:pointer;color:var(--warm-gray);}
.modal-close:hover{color:var(--dark);}
.modal-title{font-family:var(--font-serif);font-size:28px;font-weight:300;margin-bottom:0.25rem;}
.modal-sub{font-size:13px;color:var(--warm-gray);margin-bottom:2rem;}
.modal-form-group{margin-bottom:1rem;}
.modal-label{display:block;font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--warm-gray);margin-bottom:6px;}
.modal-input{width:100%;border:none;border-bottom:1px solid var(--border);background:transparent;font-family:var(--font-sans);font-size:14px;padding:8px 0;outline:none;color:var(--dark);transition:border-color 0.2s;}
.modal-input:focus{border-color:var(--dark);}
.modal-dates{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.modal-submit{width:100%;background:var(--dark);color:var(--cream);border:none;padding:1rem;font-size:12px;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;font-family:var(--font-sans);margin-top:0.5rem;transition:var(--transition);border-radius:6px;}
.modal-submit:hover{background:var(--gold);color:var(--dark);}
.modal-success{text-align:center;padding:2rem 0;}
.modal-success-icon{font-size:48px;margin-bottom:1rem;}
.modal-success-title{font-family:var(--font-serif);font-size:26px;font-weight:300;margin-bottom:0.5rem;}
.modal-success-sub{font-size:13px;color:var(--warm-gray);}
.modal-error{background:rgba(155,44,44,0.08);border:1px solid rgba(155,44,44,0.2);color:#9B2C2C;padding:0.75rem 1rem;font-size:13px;margin-bottom:1rem;border-radius:6px;}
/* ADMIN */
.admin-layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 68px);}
.admin-sidebar{background:var(--dark);padding:2rem 0;display:flex;flex-direction:column;gap:4px;}
.admin-sidebar-title{font-size:10px;letter-spacing:0.25em;color:rgba(245,240,232,0.3);text-transform:uppercase;padding:0 1.5rem;margin-bottom:0.5rem;margin-top:1rem;}
.admin-nav-item{display:flex;align-items:center;gap:10px;padding:0.6rem 1.5rem;font-size:13px;color:rgba(245,240,232,0.6);cursor:pointer;transition:all 0.2s;border:none;background:none;font-family:var(--font-sans);width:100%;text-align:left;}
.admin-nav-item:hover,.admin-nav-item.active{color:var(--cream);background:rgba(245,240,232,0.08);}
.admin-nav-item.active{border-left:2px solid var(--gold);}
.admin-content{padding:2.5rem;overflow-y:auto;}
.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;}
.admin-title{font-family:var(--font-serif);font-size:32px;font-weight:300;}
.admin-stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2.5rem;}
.admin-stat-card{background:var(--card-bg);border:1px solid var(--border);padding:1.5rem;}
.admin-stat-num{font-family:var(--font-serif);font-size:36px;font-weight:300;margin-bottom:4px;}
.admin-stat-label{font-size:11px;letter-spacing:0.15em;color:var(--warm-gray);text-transform:uppercase;}
.admin-stat-trend{font-size:12px;margin-top:6px;}
.admin-stat-up{color:var(--success);}
.admin-stat-down{color:var(--danger);}
.admin-table-wrap{background:var(--card-bg);border:1px solid var(--border);overflow:hidden;}
.admin-table-header{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);}
.admin-table-title{font-size:14px;font-weight:500;}
.admin-btn{background:var(--dark);color:var(--cream);border:none;padding:0.5rem 1.25rem;font-size:12px;letter-spacing:0.08em;cursor:pointer;font-family:var(--font-sans);transition:var(--transition);border-radius:6px;}
.admin-btn:hover{background:var(--gold);color:var(--dark);}
.admin-btn-sm{padding:0.35rem 0.8rem;font-size:11px;}
.admin-btn-danger{background:var(--danger);color:white;border-radius:6px;}
.admin-btn-danger:hover{background:#7B2222;}
.admin-btn-outline{background:none;border:1px solid var(--border);color:var(--dark);border-radius:6px;}
.admin-btn-outline:hover{border-color:var(--dark);background:var(--dark);color:var(--cream);}
table{width:100%;border-collapse:collapse;}
th{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--warm-gray);padding:0.75rem 1.5rem;text-align:left;border-bottom:1px solid var(--border);background:var(--card-bg);}
td{padding:0.85rem 1.5rem;font-size:13px;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(201,168,76,0.04);}
.status-badge{display:inline-flex;align-items:center;padding:3px 10px;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;font-weight:500;}
.status-active{background:rgba(45,106,79,0.12);color:#2D6A4F;}
.status-pending{background:rgba(201,168,76,0.15);color:#8B6914;}
.status-inactive{background:rgba(139,132,128,0.15);color:var(--warm-gray);}
.status-sold{background:rgba(26,23,20,0.1);color:var(--dark);}
/* FORM in admin */
.admin-form{display:flex;flex-direction:column;gap:1rem;}
.admin-form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.admin-form-group{display:flex;flex-direction:column;gap:6px;}
.admin-form-label{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--warm-gray);}
.admin-form-input{border:1px solid var(--border);background:white;font-family:var(--font-sans);font-size:13px;padding:0.6rem 0.85rem;outline:none;color:var(--dark);transition:border-color 0.2s;}
.admin-form-input:focus{border-color:var(--gold);}
textarea.admin-form-input{resize:vertical;min-height:90px;}
/* I18N SELECTOR */
.lang-selector{display:flex;gap:4px;}
.lang-btn{background:none;border:1px solid var(--border);padding:4px 10px;font-size:11px;letter-spacing:0.08em;cursor:pointer;font-family:var(--font-sans);color:var(--warm-gray);transition:var(--transition);}
.lang-btn.active{background:var(--dark);color:var(--cream);border-color:var(--dark);}
/* UPLOAD ZONE */
.upload-zone{border:2px dashed var(--border);padding:2rem;text-align:center;cursor:pointer;transition:var(--transition);}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--gold);background:rgba(201,168,76,0.05);}
.upload-zone input{display:none;}
.upload-preview{display:flex;flex-wrap:wrap;gap:8px;margin-top:1rem;}
.upload-thumb{width:80px;height:60px;background:#2C2318;display:flex;align-items:center;justify-content:center;font-size:24px;position:relative;overflow:hidden;}
.upload-thumb-del{position:absolute;top:2px;right:2px;background:var(--danger);color:white;border:none;width:16px;height:16px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
/* NOTIFICATIONS PANEL */
.notif-list{display:flex;flex-direction:column;gap:8px;}
.notif-item{background:var(--card-bg);border:1px solid var(--border);padding:1rem 1.25rem;display:flex;align-items:flex-start;gap:12px;}
.notif-item.unread{border-left:3px solid var(--gold);}
.notif-icon{font-size:18px;flex-shrink:0;margin-top:2px;}
.notif-body{flex:1;}
.notif-title{font-size:13px;font-weight:500;margin-bottom:2px;}
.notif-msg{font-size:12px;color:var(--warm-gray);}
.notif-time{font-size:11px;color:var(--warm-gray);margin-top:4px;}
/* AUTH */
.auth-page{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 68px);padding:2rem;}
.auth-card{background:var(--card-bg);border:1px solid var(--border);padding:3rem;max-width:420px;width:100%;animation:modalIn 0.3s ease;}
.auth-title{font-family:var(--font-serif);font-size:32px;font-weight:300;margin-bottom:0.5rem;}
.auth-sub{font-size:13px;color:var(--warm-gray);margin-bottom:2rem;}
.auth-tabs{display:flex;gap:0;margin-bottom:2rem;border-bottom:1px solid var(--border);}
.auth-tab{flex:1;padding:0.75rem;font-size:13px;letter-spacing:0.06em;cursor:pointer;background:none;border:none;font-family:var(--font-sans);color:var(--warm-gray);transition:all 0.2s;border-bottom:2px solid transparent;margin-bottom:-1px;}
.auth-tab.active{color:var(--dark);border-bottom-color:var(--gold);}
.auth-divider{text-align:center;position:relative;margin:1.5rem 0;}
.auth-divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:var(--border);}
.auth-divider span{background:var(--card-bg);padding:0 1rem;position:relative;font-size:12px;color:var(--warm-gray);}
.btn-google{width:100%;background:white;border:1px solid var(--border);padding:0.75rem;font-size:13px;cursor:pointer;font-family:var(--font-sans);display:flex;align-items:center;justify-content:center;gap:8px;transition:var(--transition);}
.btn-google:hover{border-color:var(--dark);}
/* PROFILE PAGE */
.profile-page{max-width:900px;margin:0 auto;padding:3rem 2.5rem;}
.profile-header{display:flex;align-items:center;gap:1.5rem;margin-bottom:2.5rem;padding-bottom:2.5rem;border-bottom:1px solid var(--border);}
.profile-avatar-lg{width:80px;height:80px;border-radius:50%;background:var(--dark);display:flex;align-items:center;justify-content:center;font-family:var(--font-serif);font-size:28px;color:var(--cream);flex-shrink:0;}
.profile-name{font-family:var(--font-serif);font-size:28px;font-weight:300;}
.profile-email{font-size:14px;color:var(--warm-gray);margin-top:4px;}
.profile-role{display:inline-block;margin-top:8px;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;padding:3px 10px;background:rgba(201,168,76,0.15);color:#8B6914;}
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem;}
.profile-section-title{font-family:var(--font-serif);font-size:20px;font-weight:300;margin-bottom:1.25rem;padding-bottom:0.75rem;border-bottom:1px solid var(--border);}
/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(26,23,20,0.2);border-radius:3px;}

@media(max-width:900px){

const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ═══════════════════════════════════════════════════════════════════
// BACKEND SIMULADO — JWT + DB + Auth + Storage + Notifications
// ═══════════════════════════════════════════════════════════════════

// ─── Utilidades JWT ─────────────────────────────────────────────────
const JWT = {
  sign(payload, secret = 'ruralvista_jwt_secret_2025') {
    const header = btoa(JSON.stringify({ alg: 'HS256', typ: 'JWT' }));
    const body = btoa(JSON.stringify({ ...payload, iat: Date.now(), exp: Date.now() + 7*24*60*60*1000 }));
    const sig = btoa(secret + body).substring(0, 20);
    return `${header}.${body}.${sig}`;
  },
  verify(token) {
    try {
      const parts = token.split('.');
      if (parts.length !== 3) return null;
      const payload = JSON.parse(atob(parts[1]));
      if (payload.exp < Date.now()) return null;
      return payload;
    } catch { return null; }
  },
};

// ─── Base de datos simulada (localStorage) ─────────────────────────
const DB = {
  get: (k, def = []) => { try { return JSON.parse(localStorage.getItem('ruralvista_'+k)) ?? def; } catch { return def; } },
  set: (k, v) => { localStorage.setItem('ruralvista_'+k, JSON.stringify(v)); },
  init() {
    // Usuarios: solo se crean si no existen
    if (!this.get('users_init', false)) {
      this.set('users', [
        { id: 'u1', name: 'Admin Rural Vista', email: 'admin@ruralvista.com', password: 'admin123', role: 'ADMIN', avatar: null, createdAt: new Date().toISOString(), lang: 'es' },
        { id: 'u2', name: 'Elena Morales', email: 'elena@ruralvista.com', password: 'agent123', role: 'AGENT', avatar: null, createdAt: new Date().toISOString(), lang: 'es' },
        { id: 'u3', name: 'James Wilson', email: 'james@gmail.com', password: 'user123', role: 'USER', avatar: null, createdAt: new Date().toISOString(), lang: 'en' },
      ]);
      this.set('users_init', true);
    }
    // Propiedades: solo se inicializan si NO hay ninguna guardada — preserva las creadas desde el admin
    if (!localStorage.getItem('ruralvista_properties')) {
      this.set('properties', INITIAL_PROPERTIES);
    }
    // Resto: solo la primera vez
    if (!this.get('initialized', false)) {
      this.set('contacts', [
        { id: 'c1', name: 'Sarah Thompson', email: 'sarah@gmail.com', phone: '+44 7700 900123', propertyId: '1', message: 'Interested in the penthouse. Can I arrange a viewing?', tipo: 'visita', status: 'PENDING', createdAt: new Date(Date.now()-86400000).toISOString(), language: 'en' },
        { id: 'c2', name: 'Klaus Müller', email: 'k.muller@web.de', phone: '+49 151 12345678', propertyId: '3', message: 'Suche nach einem Haus mit Pool. Wann ist eine Besichtigung möglich?', tipo: 'visita', status: 'CONTACTED', createdAt: new Date(Date.now()-172800000).toISOString(), language: 'de' },
        { id: 'c3', name: 'Ana García', email: 'ana@hotmail.com', phone: '+34 666 123456', propertyId: '2', message: 'Me interesa el piso modernista. Precio negociable?', tipo: 'info', status: 'PENDING', createdAt: new Date(Date.now()-3600000).toISOString(), language: 'es' },
      ]);
      this.set('notifications', [
        { id: 'n1', userId: 'u1', type: 'new_contact', title: 'Nueva solicitud de visita', message: 'Sarah Thompson quiere visitar el Ático de lujo', read: false, createdAt: new Date(Date.now()-86400000).toISOString() },
        { id: 'n2', userId: 'u1', type: 'new_contact', title: 'Consulta de cliente', message: 'Klaus Müller pregunta por el chalet con piscina', read: false, createdAt: new Date(Date.now()-172800000).toISOString() },
        { id: 'n3', userId: 'u1', type: 'system', title: 'Bienvenido a Rural Vista', message: 'Tu plataforma inmobiliaria está lista', read: true, createdAt: new Date(Date.now()-604800000).toISOString() },
      ]);
      if (!localStorage.getItem('ruralvista_favorites')) this.set('favorites', {});
      this.set('initialized', true);
    }
  },
};

// ─── Auth Service ───────────────────────────────────────────────────
const AuthService = {
  login(email, password) {
    const users = DB.get('users');
    const user = users.find(u => u.email === email && u.password === password);
    if (!user) return { error: 'Credenciales incorrectas' };
    const { password: _, ...safeUser } = user;
    const token = JWT.sign({ id: user.id, email: user.email, role: user.role, name: user.name });
    return { token, user: safeUser };
  },
  register(name, email, password, lang = 'es') {
    const users = DB.get('users');
    if (users.find(u => u.email === email)) return { error: 'Este email ya está registrado' };
    const newUser = { id: 'u' + Date.now(), name, email, password, role: 'USER', avatar: null, createdAt: new Date().toISOString(), lang };
    DB.set('users', [...users, newUser]);
    const { password: _, ...safeUser } = newUser;
    const token = JWT.sign({ id: newUser.id, email, role: 'USER', name });
    const notifs = DB.get('notifications');
    DB.set('notifications', [...notifs, { id: 'n'+Date.now(), userId: newUser.id, type: 'welcome', title: '¡Bienvenido a Rural Vista!', message: 'Tu cuenta ha sido creada con éxito.', read: false, createdAt: new Date().toISOString() }]);
    return { token, user: safeUser };
  },
  me(token) {
    const payload = JWT.verify(token);
    if (!payload) return null;
    const users = DB.get('users');
    const user = users.find(u => u.id === payload.id);
    if (!user) return null;
    const { password: _, ...safeUser } = user;
    return safeUser;
  },
};

// ─── Property Service ────────────────────────────────────────────────
const PropertyService = {
  list(filters = {}) {
    let props = DB.get('properties', INITIAL_PROPERTIES);
    if (filters.tipo) props = props.filter(p => p.tipo === filters.tipo);
    if (filters.district) props = props.filter(p => p.district?.toLowerCase().includes(filters.district.toLowerCase()));
    if (filters.maxPrice) props = props.filter(p => p.price <= Number(filters.maxPrice));
    if (filters.minM2) props = props.filter(p => p.m2 >= Number(filters.minM2));
    if (filters.minBedrooms) props = props.filter(p => p.hab >= Number(filters.minBedrooms));
    if (filters.search) {
      const q = filters.search.toLowerCase();
      props = props.filter(p => p.title.toLowerCase().includes(q) || p.location.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q));
    }
    if (filters.status && filters.status !== 'all') props = props.filter(p => p.status === filters.status);
    return props;
  },
  getById(id) { return DB.get('properties', INITIAL_PROPERTIES).find(p => p.id === String(id)); },
  create(data) {
    const props = DB.get('properties', INITIAL_PROPERTIES);
    const newProp = { ...data, id: String(Date.now()), createdAt: new Date().toISOString(), status: 'ACTIVE', views: 0 };
    DB.set('properties', [...props, newProp]);
    return newProp;
  },
  update(id, data) {
    const props = DB.get('properties', INITIAL_PROPERTIES);
    const updated = props.map(p => p.id === String(id) ? { ...p, ...data, updatedAt: new Date().toISOString() } : p);
    DB.set('properties', updated);
    return updated.find(p => p.id === String(id));
  },
  delete(id) {
    const props = DB.get('properties', INITIAL_PROPERTIES);
    DB.set('properties', props.filter(p => p.id !== String(id)));
    return { success: true };
  },
};

// ─── Contact Service ─────────────────────────────────────────────────
const ContactService = {
  submit(data) {
    const contacts = DB.get('contacts');
    const newContact = { ...data, id: 'c'+Date.now(), status: 'PENDING', createdAt: new Date().toISOString() };
    DB.set('contacts', [...contacts, newContact]);
    // Simular email de notificación
    const notifs = DB.get('notifications');
    DB.set('notifications', [...notifs, { id: 'n'+Date.now(), userId: 'u1', type: 'new_contact', title: 'Nueva solicitud recibida', message: `${data.name} ha enviado una solicitud de ${data.tipo}`, read: false, createdAt: new Date().toISOString() }]);
    return newContact;
  },
  list() { return DB.get('contacts').sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)); },
  updateStatus(id, status) {
    const contacts = DB.get('contacts');
    DB.set('contacts', contacts.map(c => c.id === id ? { ...c, status } : c));
  },
};

// ─── Favorites Service ────────────────────────────────────────────────
const FavService = {
  get(userId) { return DB.get('favorites')[userId] || []; },
  toggle(userId, propId) {
    const favs = DB.get('favorites');
    const userFavs = favs[userId] || [];
    favs[userId] = userFavs.includes(propId) ? userFavs.filter(f => f !== propId) : [...userFavs, propId];
    DB.set('favorites', favs);
    return favs[userId];
  },
};

// ─── Notification Service ─────────────────────────────────────────────
const NotifService = {
  list(userId) { return DB.get('notifications').filter(n => n.userId === userId).sort((a,b) => new Date(b.createdAt)-new Date(a.createdAt)); },
  markRead(id) {
    const notifs = DB.get('notifications');
    DB.set('notifications', notifs.map(n => n.id === id ? { ...n, read: true } : n));
  },
  markAllRead(userId) {
    const notifs = DB.get('notifications');
    DB.set('notifications', notifs.map(n => n.userId === userId ? { ...n, read: true } : n));
  },
  unreadCount(userId) { return DB.get('notifications').filter(n => n.userId === userId && !n.read).length; },
};

// ─── Upload Service (simulado) ────────────────────────────────────────
const UploadService = {
  async upload(file) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const fakeUrl = e.target.result; // base64 como "S3 URL"
        setTimeout(() => resolve({ url: fakeUrl, name: file.name, size: file.size }), 400 + Math.random()*600);
      };
      reader.readAsDataURL(file);
    });
  },
};

// HOOKS
// ═══════════════════════════════════════════════════════════════════
function useAuth() {
  const [token, setToken] = useState(() => localStorage.getItem('ruralvista_token'));
  const [user, setUser] = useState(() => {
    const t = localStorage.getItem('ruralvista_token');
    return t ? AuthService.me(t) : null;
  });

  const login = useCallback((email, password) => {
    const res = AuthService.login(email, password);
    if (res.error) return res;
    localStorage.setItem('ruralvista_token', res.token);
    setToken(res.token);
    setUser(res.user);
    return res;
  }, []);

  const register = useCallback((name, email, password, lang) => {
    const res = AuthService.register(name, email, password, lang);
    if (res.error) return res;
    localStorage.setItem('ruralvista_token', res.token);
    setToken(res.token);
    setUser(res.user);
    return res;
  }, []);

  const logout = useCallback(() => {
    localStorage.removeItem('ruralvista_token');
    setToken(null);
    setUser(null);
  }, []);

  return { user, token, login, register, logout, isAdmin: user?.role === 'ADMIN' || user?.role === 'SUPER_ADMIN' };
}

}

// LANG SELECTOR — dropdown
// ═══════════════════════════════════════════════════════════════════
function LangSelector({ lang, setLang }) {
  const [open, setOpen] = useState(false);
  const langData = {
    es: { label:'Español',   code:'ES', img:'https://flagcdn.com/20x15/es.png' },
    en: { label:'English',   code:'EN', img:'https://flagcdn.com/20x15/gb.png' },
    de: { label:'Deutsch',   code:'DE', img:'https://flagcdn.com/20x15/de.png' },
    nl: { label:'Nederlands',code:'NL', img:'https://flagcdn.com/20x15/nl.png' },
  };
  const ref = useRef(null);
  useEffect(() => {
    const handler = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);
  const current = langData[lang];
  return (
    <div ref={ref} style={{position:'relative'}}>
      <button onClick={() => setOpen(o => !o)} style={{display:'flex',alignItems:'center',gap:7,background:'none',border:'1px solid var(--border)',padding:'5px 10px',cursor:'pointer',fontFamily:'var(--font-sans)',fontSize:12,color:'var(--dark)',fontWeight:600,transition:'var(--transition)',borderRadius:4}}>
        <img src={current.img} alt={current.label} style={{width:20,height:15,borderRadius:2,objectFit:'cover'}}/>
        {current.code}
        <span style={{fontSize:9,opacity:0.4}}>▾</span>
      </button>
      {open && (
        <div style={{position:'absolute',top:'calc(100% + 6px)',right:0,background:'white',border:'1px solid var(--border)',boxShadow:'var(--shadow)',zIndex:300,minWidth:140,overflow:'hidden',borderRadius:6}}>
          {Object.entries(langData).map(([code, d]) => (
            <button key={code} onClick={() => { setLang(code); setOpen(false); }} style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'9px 14px',background:lang===code?'#EFF6FF':'none',border:'none',cursor:'pointer',fontFamily:'var(--font-sans)',fontSize:13,color:'var(--dark)',fontWeight:lang===code?600:400,textAlign:'left'}}>
              <img src={d.img} alt={d.label} style={{width:20,height:15,borderRadius:2,objectFit:'cover',flexShrink:0}}/>
              {d.label}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// PROPERTY CARD
// ═══════════════════════════════════════════════════════════════════
function PropertyCard({ prop, favs, toggleFav, setDetailId, setPage, addToast, index, t, user }) {
  const isFav = favs.includes(prop.id);
  const [imgIdx, setImgIdx] = useState(0);
  const photos = (prop.imgs || []).filter(i => i && (i.startsWith('data:') || i.startsWith('http')));
  const total = photos.length;

  const prev = (e) => { e.stopPropagation(); setImgIdx(i => (i - 1 + total) % total); };
  const next = (e) => { e.stopPropagation(); setImgIdx(i => (i + 1) % total); };

  return (
    <div className="property-card" style={{animationDelay:`${index*0.07}s`}} onClick={() => { setDetailId(prop.id); setPage('detail'); }}>
      <div className="card-img-wrap">
        {total > 0 ? (
          <img src={photos[imgIdx]} style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}} alt={prop.title}/>

          <div className="card-img-placeholder" style={{background:prop.bgColor}}><span>{prop.emojiBg}</span></div>

        {total > 1 && (
          <>
            <button onClick={prev} style={{position:'absolute',left:6,top:'50%',transform:'translateY(-50%)',background:'rgba(0,0,0,0.45)',color:'white',border:'none',borderRadius:'50%',width:28,height:28,fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>‹</button>

            </div>
          </>
        )}
      </div>
      <div className="card-body">
        <div className="card-price">{prop.priceLabel}</div>
        <div className="card-price-sub">{prop.priceNote}</div>
        <div className="card-title">{prop.title}</div>
        <div className="card-location">📍 {prop.location}</div>
        <div className="card-details">
          <span>🛏 {prop.hab} {t.card.beds}</span>
          <span>🚿 {prop.banos} {t.card.baths}</span>
          <span>📐 {prop.m2} m²</span>
          {prop.parking && <span>🚗</span>}
        </div>
        <div className="card-actions" onClick={e=>e.stopPropagation()}>
          <button className="card-btn" onClick={() => { setDetailId(prop.id); setPage('detail'); }}>{t.card.detail}</button>
          <button className="card-btn card-btn-primary" onClick={e => { e.stopPropagation(); setDetailId(prop.id); setPage('detail'); }}>{t.card.info}</button>
        </div>
      </div>
    </div>
  );
}

// MAPA REAL — muestra la zona sin ubicación exacta, sin redirecciones
// ═══════════════════════════════════════════════════════════════════
function RealMap({ location, t }) {
  const s = t?.search || {};
  const [iframeSrc, setIframeSrc] = useState(null);
  const [status, setStatus] = useState('loading');

  useEffect(() => {
    if (!location) return;
    setStatus('loading');

    fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(location)}&limit=1&lang=es`)
      .then(r => r.json())
      .then(data => {
        if (!data?.features?.length) throw new Error('no results');
        const [lon, lat] = data.features[0].geometry.coordinates;
        const bbox = 0.04;
        const src = `https://www.openstreetmap.org/export/embed.html?bbox=${lon-bbox}%2C${lat-bbox}%2C${lon+bbox}%2C${lat+bbox}&layer=mapnik`;
        setIframeSrc(src);
        setStatus('ok');
      })
      .catch(() => {
        // Fallback: busca sin transformaciones, usa coordenadas genéricas de España
        // Intentamos con la API de nominatim como segundo intento
        fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(location)}&format=json&limit=1`)
          .then(r => r.json())
          .then(data => {
            if (!data?.length) { setStatus('error'); return; }
            const lat = parseFloat(data[0].lat);
            const lon = parseFloat(data[0].lon);
            const bbox = 0.04;
            const src = `https://www.openstreetmap.org/export/embed.html?bbox=${lon-bbox}%2C${lat-bbox}%2C${lon+bbox}%2C${lat+bbox}&layer=mapnik`;
            setIframeSrc(src);
            setStatus('ok');
          })
          .catch(() => setStatus('error'));
      });
  }, [location]);

  return (
    <div style={{border:'1px solid var(--border)',borderRadius:4,overflow:'hidden',marginBottom:'2rem'}}>
      {status === 'loading' && (
        <div style={{height:300,display:'flex',alignItems:'center',justifyContent:'center',background:'#EFF6FF',color:'var(--warm-gray)',fontSize:13,gap:8}}>
          <span style={{animation:'spin 1s linear infinite',display:'inline-block',fontSize:18}}>⟳</span>
          {s.mapLoading||'Cargando mapa...'}
        </div>
      )}
      {status === 'error' && (
        <div style={{height:300,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'#EFF6FF',color:'var(--warm-gray)',gap:8}}>
          <span style={{fontSize:32}}>📍</span>
          <span style={{fontWeight:600,color:'var(--dark)'}}>{location}</span>
        </div>
      )}
      {status === 'ok' && iframeSrc && (
        <iframe
          title={`Mapa ${location}`}
          src={iframeSrc}
          width="100%"
          height="300"
          frameBorder="0"
          scrolling="no"
          style={{display:'block',border:'none',pointerEvents:'none'}}
        />
      )}
      <div style={{padding:'0.5rem 0.75rem',background:'var(--card-bg)',fontSize:11,color:'var(--warm-gray)',borderTop:'1px solid var(--border)',display:'flex',alignItems:'center',gap:6}}>
        <span>📍</span> {location}
      </div>
    </div>
  );
}

// HERO SEARCH
function HeroSearch({ setPage, t, heroFilters, setHeroFilters }) {
  const form = heroFilters;
  const setForm = setHeroFilters;
  const [suggestions, setSuggestions] = useState([]);
  const [showSugg, setShowSugg] = useState(false);
  const inputRef = useRef(null);
  const suggRef = useRef(null);
  const s = t.search || {};

  // Extraer todas las ubicaciones únicas de las propiedades
  const allLocations = useMemo(() => {
    const props = PropertyService.list({});
    const locs = new Set();
    props.forEach(p => {
      if (p.location) {
        locs.add(p.location);
        // También añadir partes individuales (ciudad, barrio)
        p.location.split(',').forEach(part => {
          const trimmed = part.trim();
          if (trimmed.length > 2) locs.add(trimmed);
        });
      }
      if (p.district) locs.add(p.district);
    });
    return Array.from(locs).sort();
  }, []);

  const handleLocationChange = (val) => {
    setForm({...form, location: val});
    if (val.length >= 1) {
      const filtered = allLocations.filter(loc =>
        loc.toLowerCase().includes(val.toLowerCase())
      ).slice(0, 6);
      setSuggestions(filtered);
      setShowSugg(filtered.length > 0);
    } else {
      setSuggestions([]);
      setShowSugg(false);
    }
  };

  const selectSuggestion = (loc) => {
    setForm({...form, location: loc});
    setSuggestions([]);
    setShowSugg(false);
    if (inputRef.current) inputRef.current.focus();
  };

  // Cerrar al hacer clic fuera
  useEffect(() => {
    const handler = e => {
      if (suggRef.current && !suggRef.current.contains(e.target) &&
          inputRef.current && !inputRef.current.contains(e.target)) {
        setShowSugg(false);
      }
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const handleSearch = () => {
    setShowSugg(false);
    if (form.propId.trim()) {
      const id = form.propId.replace(/^RV-0*/i, '');
      const prop = PropertyService.getById(id);
      if (prop) { setPage('detail_from_search_' + id); return; }
    }
    setPage('catalogue');
  };

  return (
    <div style={{background:'white',borderBottom:'1px solid var(--border)',boxShadow:'0 4px 24px rgba(37,99,168,0.08)'}}>
      <div style={{maxWidth:1400,margin:'0 auto',padding:'0.75rem 1.25rem'}}>
        <div className="hero-search-bar" style={{background:'white',border:'1.5px solid rgba(37,99,168,0.18)',borderRadius:10,boxShadow:'0 2px 16px rgba(37,99,168,0.07)',display:'flex',alignItems:'stretch',overflow:'visible',flexWrap:'wrap'}}>

          {/* Campo búsqueda con autocomplete */}
          <div className="hero-search-field" style={{display:'flex',flexDirection:'column',gap:5,flex:'2 1 180px',padding:'0.9rem 1.4rem',borderRight:'1px solid #E8EEF6',position:'relative',minWidth:0}}>
            <div style={{fontSize:10,letterSpacing:'0.18em',textTransform:'uppercase',color:'var(--warm-gray)',fontWeight:600}}>{s.label}</div>
            <input
              ref={inputRef}
              style={{border:'none',background:'transparent',fontFamily:'inherit',fontSize:14,fontWeight:500,color:'var(--dark)',outline:'none',width:'100%',padding:0,minWidth:0}}
              placeholder={s.ph||"Ciudad, zona, descripción..."}
              value={form.location}
              onChange={e => handleLocationChange(e.target.value)}
              onFocus={() => form.location && suggestions.length > 0 && setShowSugg(true)}
              onKeyDown={e => { if (e.key==='Enter'){handleSearch();} if(e.key==='Escape')setShowSugg(false); }}
              autoComplete="off"
            />
            {showSugg && (
              <div ref={suggRef} style={{position:'absolute',top:'calc(100% + 4px)',left:0,right:0,background:'white',border:'1px solid rgba(37,99,168,0.15)',borderRadius:8,boxShadow:'0 8px 24px rgba(37,99,168,0.12)',zIndex:50,overflow:'hidden'}}>
                {suggestions.map((s2, i) => (
                  <div key={i} onMouseDown={() => selectSuggestion(s2)}
                    style={{padding:'0.6rem 1rem',fontSize:13,color:'var(--dark)',cursor:'pointer',display:'flex',alignItems:'center',gap:8,borderBottom:i<suggestions.length-1?'1px solid #F0F4FA':'none'}}
                    onMouseOver={e=>e.currentTarget.style.background='#EFF6FF'} onMouseOut={e=>e.currentTarget.style.background='white'}>
                    <span style={{color:'#2563A8',fontSize:12}}>📍</span>{s2}
                  </div>
                ))}
              </div>
            )}
          </div>

          <div className="hero-search-field" style={{display:'flex',flexDirection:'column',gap:5,flex:'1 1 110px',padding:'0.9rem 1.2rem',borderRight:'1px solid #E8EEF6',minWidth:0}}>
            <div style={{fontSize:10,letterSpacing:'0.18em',textTransform:'uppercase',color:'var(--warm-gray)',fontWeight:600}}>{s.tipo}</div>
            <select style={{border:'none',background:'transparent',fontFamily:'inherit',fontSize:14,fontWeight:500,color:'var(--dark)',outline:'none',padding:0,cursor:'pointer',appearance:'none',minWidth:0}} value={form.tipo} onChange={e=>setForm({...form,tipo:e.target.value})}>
              <option value="">{s.tipoAll}</option>
              <option value="venta">{s.tipoSale}</option>
              <option value="alquiler">{s.tipoRent}</option>
            </select>

function AuthPage({ login, register, setPage, addToast, t, lang }) {
  const [tab, setTab] = useState('login');
  const [form, setForm] = useState({name:'',email:'',password:''});
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handleSubmit = async e => {
    e.preventDefault();
    setError('');
    setLoading(true);
    await new Promise(r => setTimeout(r, 600)); // simular latencia de red
    if (tab === 'login') {
      const res = login(form.email, form.password);
      if (res.error) { setError(res.error); setLoading(false); return; }
      addToast({icon:'👋',msg:t.toast.loginOk,gold:true});
      setPage('home');
    } else {
      if (!form.name.trim()) { setError('El nombre es obligatorio'); setLoading(false); return; }
      const res = register(form.name, form.email, form.password, lang);
      if (res.error) { setError(res.error); setLoading(false); return; }
      addToast({icon:'🎉',msg:t.toast.registerOk,gold:true});
      setPage('home');
    }
    setLoading(false);
  };

  return (
    <div className="page auth-page">
      <div className="auth-card">
        <div className="auth-title">{t.auth.title}</div>
        <div className="auth-sub">{t.auth.sub}</div>
        <div className="auth-tabs">
          <button className={`auth-tab ${tab==='login'?'active':''}`} onClick={() => { setTab('login'); setError(''); }}>{t.auth.login}</button>
          <button className={`auth-tab ${tab==='register'?'active':''}`} onClick={() => { setTab('register'); setError(''); }}>{t.auth.register}</button>
        </div>
        {error && <div className="modal-error">⚠ {error}</div>}
        <form onSubmit={handleSubmit}>
          {tab==='register' && (
            <div className="modal-form-group"><label className="modal-label">{t.auth.name}</label><input className="modal-input" required value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Elena García"/></div>
          )}
          <div className="modal-form-group"><label className="modal-label">{t.auth.email}</label><input className="modal-input" type="email" required value={form.email} onChange={e=>setForm({...form,email:e.target.value})} placeholder="tu@email.com"/></div>
          <div className="modal-form-group"><label className="modal-label">{t.auth.password}</label><input className="modal-input" type="password" required value={form.password} onChange={e=>setForm({...form,password:e.target.value})} placeholder="••••••••"/></div>
          <button type="submit" className="modal-submit" disabled={loading} style={{opacity:loading?0.7:1}}>
            {loading ? '⏳ Cargando...' : tab==='login' ? t.auth.loginBtn : t.auth.registerBtn}
          </button>
        </form>
        <div className="auth-divider"><span>o</span></div>
        <button className="btn-google" onClick={() => { addToast({icon:'🔗',msg:'OAuth Google — requiere backend real'}); }}>
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          {t.auth.withGoogle}

        <div style={{marginTop:'1.5rem',textAlign:'center',fontSize:13,color:'var(--warm-gray)'}}>

          ) : (
            <>{t.auth.alreadyHave} <button style={{background:'none',border:'none',cursor:'pointer',color:'var(--dark)',fontWeight:500,textDecoration:'underline',fontFamily:'var(--font-sans)',fontSize:13}} onClick={() => setTab('login')}>{t.auth.login}</button></>
          )}

        <div style={{marginTop:'1.5rem',padding:'1rem',background:'rgba(201,168,76,0.08)',border:'1px solid rgba(201,168,76,0.2)',fontSize:12,color:'var(--warm-gray)'}}>

// CLOUDINARY URL INPUT
function CloudinaryUrlInput({ uploadedImgs, setUploadedImgs }) {
  const [urlInput, setUrlInput] = useState('');
  const [error, setError] = useState('');

  const addUrl = () => {
    const url = urlInput.trim();
    if (!url) return;
    if (!url.startsWith('http://') && !url.startsWith('https://')) {
      setError('La URL debe empezar por http:// o https://');
      return;
    }
    if (uploadedImgs.some(i => i.url === url)) {
      setError('Esta URL ya está añadida');
      return;
    }
    setUploadedImgs(prev => [...prev, { url, name: url.split('/').pop() }]);
    setUrlInput('');
    setError('');
  };

  return (
    <div>
      <div style={{fontSize:12,color:'var(--warm-gray)',marginBottom:8}}>
        Pega la URL de Cloudinary de cada imagen y pulsa <strong>Añadir</strong>. Puedes añadir varias.
      </div>
      <div style={{display:'flex',gap:8,marginBottom:8}}>
        <input
          className="admin-form-input"
          style={{flex:1}}
          placeholder="https://res.cloudinary.com/..."
          value={urlInput}
          onChange={e=>{setUrlInput(e.target.value);setError('');}}
          onKeyDown={e=>e.key==='Enter'&&addUrl()}
        />
        <button className="admin-btn admin-btn-sm" onClick={addUrl} style={{flexShrink:0}}>
          + Añadir
        </button>
      </div>
      {error && <div style={{color:'var(--danger)',fontSize:12,marginBottom:8}}>{error}</div>}
      {uploadedImgs.length > 0 && (
        <div>
          <div style={{fontSize:12,color:'var(--warm-gray)',marginBottom:6}}>{uploadedImgs.length} imagen{uploadedImgs.length>1?'es':''} añadida{uploadedImgs.length>1?'s':''}:</div>
          <div className="upload-preview">
            {uploadedImgs.map((img,i) => (
              <div key={i} className="upload-thumb" style={{position:'relative'}}>
                <img src={img.url} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}} onError={e=>{e.target.style.display='none';e.target.nextSibling.style.display='flex';}}/>
                <div style={{display:'none',position:'absolute',inset:0,background:'#EFF6FF',alignItems:'center',justifyContent:'center',fontSize:10,color:'var(--warm-gray)',padding:4,textAlign:'center'}}>Error cargando imagen</div>
                <button className="upload-thumb-del" onClick={()=>setUploadedImgs(prev=>prev.filter((_,j)=>j!==i))}>×</button>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}
