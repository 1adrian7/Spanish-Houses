// ═══════════════════════════════════════════════════════════════════
function AdminPanel({ user, setPage, addToast }) {
  const [section, setSection] = useState('dashboard');
  const [properties, setProperties] = useState(() => PropertyService.list({}));
  const [contacts, setContacts] = useState(() => ContactService.list());
  const [users, setUsers] = useState(() => DB.get('users').map(({password:_,...u})=>u));
  const [editProp, setEditProp] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [propForm, setPropForm] = useState({ title:'', tipo:'venta', price:'', m2:'', hab:'', banos:'', location:'', district:'', desc:'', emojiBg:'🏠', bgColor:'#2C2318', planta:'', parking:false, badge:'venta', has360:false, imgs:['🏠'], rooms360:[], amenities:[], status:'ACTIVE', featured:false, nuevo:false, priceNote:'Precio de venta', priceLabel:'' });
  const [uploadedImgs, setUploadedImgs] = useState([]);
  const [uploading, setUploading] = useState(false);
  const [searchContacts, setSearchContacts] = useState('');

  const refresh = () => {
    setProperties(PropertyService.list({}));
    setContacts(ContactService.list());
    setUsers(DB.get('users').map(({password:_,...u})=>u));
  };

  const stats = useMemo(() => {
    const props = PropertyService.list({});
    const contacts = ContactService.list();
    return {
      totalProps: props.length,
      activeProps: props.filter(p=>p.status==='ACTIVE').length,
      totalViews: props.reduce((a,p) => a+(p.views||0), 0),
      pendingContacts: contacts.filter(c=>c.status==='PENDING').length,
      totalContacts: contacts.length,
      totalUsers: DB.get('users').length,
      avgPrice: Math.round(props.filter(p=>p.tipo==='venta').reduce((a,p)=>a+p.price,0)/Math.max(props.filter(p=>p.tipo==='venta').length,1)),
    };
  }, [section]);

  const handleDeleteProp = id => {
    if(!confirm('¿Eliminar esta propiedad?')) return;
    PropertyService.delete(id);
    refresh();
    addToast({icon:'🗑️',msg:'Propiedad eliminada'});
  };

  const handleEditProp = prop => {
    setPropForm({...prop, price:String(prop.price), m2:String(prop.m2), hab:String(prop.hab), banos:String(prop.banos), imgs: prop.imgs||['🏠'], amenities: prop.amenities||[], rooms360: prop.rooms360||[]});
    setUploadedImgs([]);
    setEditProp(prop);
    setShowForm(true);
  };

  const handleNewProp = () => {
    setPropForm({ title:'', tipo:'venta', price:'', m2:'', hab:'', banos:'', location:'', district:'', desc:'', emojiBg:'🏠', bgColor:'#2C2318', planta:'', parking:false, badge:'venta', has360:false, imgs:['🏠'], rooms360:[], amenities:[], status:'ACTIVE', featured:false, nuevo:false, priceNote:'Precio de venta', priceLabel:'' });
    setUploadedImgs([]);
    setEditProp(null);
    setShowForm(true);
  };

  const handleSaveProp = () => {
    const imgs = uploadedImgs.length > 0 ? uploadedImgs.map(i => i.url) : propForm.imgs;
    const data = {
      ...propForm,
      price: Number(propForm.price),
      m2: Number(propForm.m2),
      hab: Number(propForm.hab),
      banos: Number(propForm.banos),
      priceLabel: `${Number(propForm.price).toLocaleString('es-ES')} €${propForm.tipo==='alquiler'?'/mes':''}`,
      imgs: imgs,
      emojiBg: uploadedImgs.length > 0 ? '📷' : propForm.emojiBg,
    };
    if (!data.title || !data.price || !data.location) { addToast({icon:'⚠️',msg:'Rellena los campos obligatorios'}); return; }
    if (editProp) { PropertyService.update(editProp.id, data); addToast({icon:'✅',msg:'Propiedad actualizada',gold:true}); }
    else { PropertyService.create(data); addToast({icon:'✅',msg:'Propiedad creada',gold:true}); }
    setShowForm(false); refresh();
  };

  const handleFileUpload = async files => {
    setUploading(true);
    const results = await Promise.all(Array.from(files).map(f => UploadService.upload(f)));
    setUploadedImgs(prev => [...prev, ...results]);
    addToast({icon:'📸',msg:`${results.length} imagen(es) subida(s)`,gold:true});
    setUploading(false);
  };

  const filteredContacts = useMemo(() => contacts.filter(c =>
    c.name.toLowerCase().includes(searchContacts.toLowerCase()) ||
    c.email.toLowerCase().includes(searchContacts.toLowerCase())
  ), [contacts, searchContacts]);

  const navItems = [
    { id:'dashboard', icon:'📊', label:'Dashboard' },
    { id:'properties', icon:'🏠', label:'Viviendas' },
    { id:'contacts', icon:'📩', label:'Contactos/Reservas' },
    { id:'users', icon:'👥', label:'Usuarios' },
    { id:'notifications', icon:'🔔', label:'Notificaciones' },
  ];

  return (
    <div className="page" style={{paddingTop:68}}>
      {showForm && (
        <div className="modal-overlay" onClick={e => e.target===e.currentTarget && setShowForm(false)}>
          <div className="modal" style={{maxWidth:700}}>
            <button className="modal-close" onClick={() => setShowForm(false)}>✕</button>
            <div className="modal-title">{editProp ? 'Editar propiedad' : 'Nueva propiedad'}</div>
            <div className="modal-sub" style={{marginBottom:'1.5rem'}}>Completa los datos del inmueble</div>
            <div className="admin-form">
              <div className="admin-form-row">
                <div className="admin-form-group"><label className="admin-form-label">Título *</label><input className="admin-form-input" value={propForm.title} onChange={e=>setPropForm({...propForm,title:e.target.value})} placeholder="Ático de lujo..."/></div>
                <div className="admin-form-group"><label className="admin-form-label">Tipo *</label><select className="admin-form-input" value={propForm.tipo} onChange={e=>setPropForm({...propForm,tipo:e.target.value,badge:e.target.value,priceNote:e.target.value==='venta'?'Precio de venta':'Mensual'})}><option value="venta">Venta</option><option value="alquiler">Alquiler</option></select></div>
              </div>
              <div className="admin-form-row">
                <div className="admin-form-group"><label className="admin-form-label">Precio (€) *</label><input className="admin-form-input" type="number" value={propForm.price} onChange={e=>setPropForm({...propForm,price:e.target.value})} placeholder="350000"/></div>
                <div className="admin-form-group"><label className="admin-form-label">M² *</label><input className="admin-form-input" type="number" value={propForm.m2} onChange={e=>setPropForm({...propForm,m2:e.target.value})} placeholder="120"/></div>
              </div>
              <div className="admin-form-row">
                <div className="admin-form-group"><label className="admin-form-label">Habitaciones</label><input className="admin-form-input" type="number" value={propForm.hab} onChange={e=>setPropForm({...propForm,hab:e.target.value})} placeholder="3"/></div>
                <div className="admin-form-group"><label className="admin-form-label">Baños</label><input className="admin-form-input" type="number" value={propForm.banos} onChange={e=>setPropForm({...propForm,banos:e.target.value})} placeholder="2"/></div>
              </div>
              <div className="admin-form-row">
                <div className="admin-form-group"><label className="admin-form-label">Ubicación *</label><input className="admin-form-input" value={propForm.location} onChange={e=>setPropForm({...propForm,location:e.target.value})} placeholder="Gran Vía, Valencia"/></div>
                <div className="admin-form-group"><label className="admin-form-label">Zona</label><input className="admin-form-input" value={propForm.district} onChange={e=>setPropForm({...propForm,district:e.target.value})} placeholder="Ej: Marbella, Costa del Sol..."/></div>
              </div>
              <div className="admin-form-row">
                <div className="admin-form-group"><label className="admin-form-label">Estado</label><select className="admin-form-input" value={propForm.status} onChange={e=>setPropForm({...propForm,status:e.target.value})}><option value="ACTIVE">Activo</option><option value="SOLD">Vendido</option><option value="INACTIVE">Inactivo</option></select></div>
              </div>
              <div className="admin-form-group"><label className="admin-form-label">Descripción</label><textarea className="admin-form-input" value={propForm.desc} onChange={e=>setPropForm({...propForm,desc:e.target.value})} placeholder="Descripción detallada..."/></div>
              <div className="admin-form-row">
                <div className="admin-form-group"><label className="admin-form-label">Emoji / icono</label><input className="admin-form-input" value={propForm.emojiBg} onChange={e=>setPropForm({...propForm,emojiBg:e.target.value})} placeholder="🏠"/></div>
                <div className="admin-form-group"><label className="admin-form-label">Color de fondo</label><input className="admin-form-input" type="color" value={propForm.bgColor} onChange={e=>setPropForm({...propForm,bgColor:e.target.value})}/></div>
              </div>
              <div style={{display:'flex',gap:'1.5rem'}}>
                <label style={{display:'flex',alignItems:'center',gap:8,fontSize:13,cursor:'pointer'}}><input type="checkbox" checked={propForm.parking} onChange={e=>setPropForm({...propForm,parking:e.target.checked})}/> Garaje</label>
                <label style={{display:'flex',alignItems:'center',gap:8,fontSize:13,cursor:'pointer'}}><input type="checkbox" checked={propForm.featured} onChange={e=>setPropForm({...propForm,featured:e.target.checked})}/> Destacado</label>
                <label style={{display:'flex',alignItems:'center',gap:8,fontSize:13,cursor:'pointer'}}><input type="checkbox" checked={propForm.nuevo} onChange={e=>setPropForm({...propForm,nuevo:e.target.checked})}/> Nuevo</label>
              </div>
              <div className="admin-form-group">
                <label className="admin-form-label">📸 Imágenes (URLs de Cloudinary)</label>
                <CloudinaryUrlInput uploadedImgs={uploadedImgs} setUploadedImgs={setUploadedImgs}/>
              </div>
              <div style={{display:'flex',gap:'1rem',marginTop:'0.5rem'}}>
                <button className="admin-btn" style={{flex:1}} onClick={handleSaveProp}>{editProp?'Guardar cambios':'Crear propiedad'}</button>
                <button className="admin-btn admin-btn-outline" onClick={() => setShowForm(false)}>Cancelar</button>
              </div>
            </div>
          </div>
        </div>
      )}

      <div className="admin-layout">
        <div className="admin-sidebar">
          <div style={{padding:'0 1.5rem 1rem',borderBottom:'1px solid rgba(245,240,232,0.1)',marginBottom:'0.5rem'}}>
            <div style={{fontFamily:'var(--font-serif)',fontSize:18,fontWeight:700,color:'var(--cream)',letterSpacing:'0.05em'}}>Rural Vista Admin</div>
            <div style={{fontSize:11,color:'rgba(245,240,232,0.4)',marginTop:4}}>{user.email}</div>
          </div>
          <div className="admin-sidebar-title">Panel</div>
          {navItems.map(item => (
            <button key={item.id} className={`admin-nav-item ${section===item.id?'active':''}`} onClick={() => setSection(item.id)}>
              <span style={{fontSize:16}}>{item.icon}</span>{item.label}
            </button>
          ))}
          <div style={{flex:1}}/>
          <button className="admin-nav-item" onClick={() => setPage('home')}>← Volver a la web</button>
        </div>

        <div className="admin-content">
          {section === 'dashboard' && (
            <div>
              <div className="admin-header"><div className="admin-title">Dashboard</div><div style={{fontSize:12,color:'var(--warm-gray)'}}>{new Date().toLocaleDateString('es-ES',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div></div>
              <div className="admin-stats-grid">
                <div className="admin-stat-card"><div className="admin-stat-num">{stats.activeProps}</div><div className="admin-stat-label">Propiedades activas</div><div className="admin-stat-trend admin-stat-up">↑ de {stats.totalProps} totales</div></div>
                <div className="admin-stat-card"><div className="admin-stat-num">{stats.totalViews.toLocaleString()}</div><div className="admin-stat-label">Visitas totales</div><div className="admin-stat-trend admin-stat-up">↑ 12% este mes</div></div>
                <div className="admin-stat-card"><div className="admin-stat-num" style={{color:'var(--danger)'}}>{stats.pendingContacts}</div><div className="admin-stat-label">Solicitudes pendientes</div><div className="admin-stat-trend">{stats.totalContacts} totales</div></div>
                <div className="admin-stat-card"><div className="admin-stat-num">{stats.totalUsers}</div><div className="admin-stat-label">Usuarios registrados</div><div className="admin-stat-trend admin-stat-up">↑ 3 este mes</div></div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1.5rem'}}>
                <div className="admin-table-wrap">
                  <div className="admin-table-header"><div className="admin-table-title">Últimas solicitudes</div><button className="admin-btn admin-btn-sm" onClick={()=>setSection('contacts')}>Ver todas</button></div>
                  <table><thead><tr><th>Cliente</th><th>Tipo</th><th>Estado</th></tr></thead><tbody>
                    {ContactService.list().slice(0,4).map(c => (
                      <tr key={c.id}><td>{c.name}</td><td style={{textTransform:'capitalize'}}>{c.tipo}</td><td><span className={`status-badge status-${c.status.toLowerCase()}`}>{c.status}</span></td></tr>
                    ))}
                  </tbody></table>
                </div>
                <div className="admin-table-wrap">
                  <div className="admin-table-header"><div className="admin-table-title">Propiedades más vistas</div><button className="admin-btn admin-btn-sm" onClick={()=>setSection('properties')}>Ver todas</button></div>
                  <table><thead><tr><th>Propiedad</th><th>Vistas</th><th>Estado</th></tr></thead><tbody>
                    {[...PropertyService.list({})].sort((a,b)=>(b.views||0)-(a.views||0)).slice(0,4).map(p => (
                      <tr key={p.id}><td style={{maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.title}</td><td style={{color:'var(--gold)',fontWeight:500}}>{p.views||0}</td><td><span className={`status-badge status-${p.status?.toLowerCase()||'active'}`}>{p.status||'ACTIVE'}</span></td></tr>
                    ))}
                  </tbody></table>
                </div>
              </div>
            </div>
          )}

          {section === 'properties' && (
            <div>
              <div className="admin-header">
                <div className="admin-title">Viviendas</div>
                <button className="admin-btn" onClick={handleNewProp}>+ Nueva propiedad</button>
              </div>
              <div className="admin-table-wrap">
                <table>
                  <thead><tr><th>Ref.</th><th>Título</th><th>Tipo</th><th>Precio</th><th>M²</th><th>Estado</th><th>Vistas</th><th>Acciones</th></tr></thead>
                  <tbody>
                    {properties.map(p => (
                      <tr key={p.id}>
                        <td style={{fontSize:11,color:'var(--warm-gray)'}}>RV-{String(p.id).padStart(4,'0')}</td>
                        <td style={{maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontWeight:500}}>{p.title}</td>
                        <td><span style={{textTransform:'capitalize',fontSize:11}}>{p.tipo}</span></td>
                        <td style={{color:'var(--dark)',fontWeight:500}}>{p.priceLabel}</td>
                        <td>{p.m2} m²</td>
                        <td><span className={`status-badge status-${(p.status||'active').toLowerCase()}`}>{p.status||'ACTIVE'}</span></td>
                        <td style={{color:'var(--gold)'}}>{p.views||0}</td>
                        <td>
                          <div style={{display:'flex',gap:4}}>
                            <button className="admin-btn admin-btn-sm admin-btn-outline" onClick={() => handleEditProp(p)}>✏️</button>
                            <button className="admin-btn admin-btn-sm admin-btn-danger" onClick={() => handleDeleteProp(p.id)}>🗑️</button>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {section === 'contacts' && (
            <div>
              <div className="admin-header">
                <div className="admin-title">Contactos & Reservas</div>
                <input className="admin-form-input" style={{width:240}} placeholder="Buscar por nombre o email..." value={searchContacts} onChange={e=>setSearchContacts(e.target.value)}/>
              </div>
              <div className="admin-table-wrap">
                <table>
                  <thead><tr><th>Cliente</th><th>Email</th><th>Propiedad</th><th>Tipo</th><th>Idioma</th><th>Estado</th><th>Fecha</th><th>Acción</th></tr></thead>
                  <tbody>
                    {filteredContacts.map(c => (
                      <tr key={c.id}>
                        <td style={{fontWeight:500}}>{c.name}</td>
                        <td style={{fontSize:12,color:'var(--warm-gray)'}}>{c.email}</td>
                        <td style={{fontSize:12}}>{c.propertyId ? `RV-${String(c.propertyId).padStart(4,'0')}` : '—'}</td>
                        <td style={{textTransform:'capitalize',fontSize:11}}>{c.tipo}</td>
                        <td style={{fontSize:12,textTransform:'uppercase'}}>{c.language||'es'}</td>
                        <td>
                          <select className="filter-select" value={c.status} onChange={e=>{ContactService.updateStatus(c.id,e.target.value);refresh();}} style={{fontSize:11}}>
                            <option value="PENDING">PENDING</option>
                            <option value="CONTACTED">CONTACTED</option>
                            <option value="CLOSED">CLOSED</option>
                          </select>
                        </td>
                        <td style={{fontSize:11,color:'var(--warm-gray)'}}>{new Date(c.createdAt).toLocaleDateString()}</td>
                        <td><button className="admin-btn admin-btn-sm admin-btn-outline" title={c.message} onClick={()=>alert(`Mensaje:\n\n${c.message}`)}>👁</button></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {section === 'users' && (
            <div>
              <div className="admin-header"><div className="admin-title">Usuarios</div></div>
              <div className="admin-table-wrap">
                <table>
                  <thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Idioma</th><th>Creado</th><th>Acción</th></tr></thead>
                  <tbody>
                    {users.map(u => (
                      <tr key={u.id}>
                        <td style={{fontWeight:500,display:'flex',alignItems:'center',gap:8}}>
                          <div style={{width:28,height:28,borderRadius:'50%',background:'var(--dark)',color:'var(--cream)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,flexShrink:0,fontWeight:500}}>{u.name.substring(0,2).toUpperCase()}</div>
                          {u.name}
                        </td>
                        <td style={{fontSize:12,color:'var(--warm-gray)'}}>{u.email}</td>
                        <td><span className={`status-badge ${u.role==='ADMIN'?'status-active':u.role==='AGENT'?'status-pending':'status-inactive'}`}>{u.role}</span></td>
                        <td style={{fontSize:12,textTransform:'uppercase'}}>{u.lang||'es'}</td>
                        <td style={{fontSize:11,color:'var(--warm-gray)'}}>{new Date(u.createdAt).toLocaleDateString()}</td>
                        <td>
                          <select className="filter-select" defaultValue={u.role} onChange={e=>{const us=DB.get('users');DB.set('users',us.map(x=>x.id===u.id?{...x,role:e.target.value}:x));refresh();addToast({icon:'✅',msg:'Rol actualizado'});}} style={{fontSize:11}}>
                            <option value="USER">USER</option>
                            <option value="AGENT">AGENT</option>
                            <option value="ADMIN">ADMIN</option>
                          </select>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {section === 'notifications' && (
            <div>
              <div className="admin-header">
                <div className="admin-title">Centro de Notificaciones</div>
                <button className="admin-btn" onClick={() => { NotifService.markAllRead(user.id); addToast({icon:'✅',msg:'Todas marcadas como leídas'}); }}>Marcar todas leídas</button>
              </div>
              <div className="notif-list">
                {NotifService.list(user.id).map(n => (
                  <div key={n.id} className={`notif-item ${!n.read?'unread':''}`}>
                    <div className="notif-icon">{n.type==='new_contact'?'📩':n.type==='welcome'?'🎉':'🔔'}</div>
                    <div className="notif-body">
                      <div className="notif-title">{n.title}</div>
                      <div className="notif-msg">{n.message}</div>
                      <div className="notif-time">{new Date(n.createdAt).toLocaleString()}</div>
                    </div>
                    {!n.read && <div style={{width:8,height:8,borderRadius:'50%',background:'var(--gold)',flexShrink:0,marginTop:6}}/>}
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════════════════
function App() {
  const [loading, setLoading] = useState(true);
  const [page, setPage] = useState('home');
  const [detailId, setDetailId] = useState(null);
  const [toasts, setToasts] = useState([]);
  const [lang, setLang] = useState(() => localStorage.getItem('ruralvista_lang') || 'es');
  const [heroFilters, setHeroFilters] = useState({tipo:'',location:'',bedrooms:'',maxPrice:'',propId:''});
  const { user, login, register, logout, isAdmin } = useAuth();
  const t = useT(lang);
  const [notifCount, setNotifCount] = useState(() => user ? NotifService.unreadCount(user.id) : 0);

  const favs = useMemo(() => {
    if (!user) return JSON.parse(localStorage.getItem('ruralvista_guest_favs') || '[]');
    return FavService.get(user.id);
  }, [user, page]);

  useEffect(() => { setTimeout(() => setLoading(false), 2000); }, []);
  useEffect(() => { window.scrollTo({top:0,behavior:'smooth'}); }, [page]);
  useEffect(() => { localStorage.setItem('ruralvista_lang', lang); }, [lang]);
  useEffect(() => { if (user) setNotifCount(NotifService.unreadCount(user.id)); }, [user, page]);

  const addToast = useCallback(t => {
    const id = Date.now();
    setToasts(ts => [...ts, {...t, id}]);
    setTimeout(() => setToasts(ts => ts.filter(x => x.id !== id)), 3000);
  }, []);

  const toggleFav = useCallback(propId => {
    if (user) {
      FavService.toggle(user.id, propId);
    } else {
      const gf = JSON.parse(localStorage.getItem('ruralvista_guest_favs')||'[]');
      const updated = gf.includes(propId) ? gf.filter(f=>f!==propId) : [...gf, propId];
      localStorage.setItem('ruralvista_guest_favs', JSON.stringify(updated));
    }
  }, [user]);

  const setPageSafe = useCallback(p => {
    if ((p==='admin') && !isAdmin) { addToast({icon:'🔒',msg:'Acceso restringido a administradores'}); return; }
    if (p.startsWith('detail_from_search_')) {
      const id = p.replace('detail_from_search_', '');
      setDetailId(id);
      setPage('detail');
      return;
    }
    setPage(p);
  }, [isAdmin]);

  return (
    <>
      {loading && (
        <div className="loader-overlay">
        <svg width="260" height="56" viewBox="0 0 260 56" fill="none" xmlns="http://www.w3.org/2000/svg" style={{opacity:0,animation:'logoReveal 0.8s ease 0.3s forwards'}}>
          <text x="130" y="36" fontFamily="'Playfair Display','Georgia',serif" fontSize="30" fontWeight="700" fill="white" letterSpacing="3" textAnchor="middle">RURAL VISTA</text>
          <rect x="21" y="42" width="218" height="3" rx="1.5" fill="#FFB347"/>
          <text x="130" y="56" fontFamily="'Plus Jakarta Sans',sans-serif" fontSize="9" fontWeight="600" fill="rgba(255,255,255,0.5)" letterSpacing="4" textAnchor="middle">PROPERTIES IN SPAIN</text>
        </svg>

          
        </div>
      )}
      <Navbar page={page} setPage={setPageSafe} favCount={favs.length} user={user} logout={logout} lang={lang} setLang={setLang} notifCount={notifCount} addToast={addToast} t={t}/>
      {page==='home' && <HomePage setPage={setPageSafe} favs={favs} toggleFav={toggleFav} setDetailId={setDetailId} addToast={addToast} t={t} user={user} heroFilters={heroFilters} setHeroFilters={setHeroFilters}/>}
      {page==='catalogue' && <CataloguePage favs={favs} toggleFav={toggleFav} setDetailId={setDetailId} setPage={setPageSafe} addToast={addToast} t={t} user={user} heroFilters={heroFilters} setHeroFilters={setHeroFilters}/>}
      {page==='detail' && detailId && <DetailPage id={detailId} favs={favs} toggleFav={toggleFav} setPage={setPageSafe} addToast={addToast} t={t} user={user}/>}
      {page==='favs' && <FavsPage favs={favs} toggleFav={toggleFav} setDetailId={setDetailId} setPage={setPageSafe} addToast={addToast} t={t} user={user}/>}
      {page==='auth' && <AuthPage login={login} register={register} setPage={setPageSafe} addToast={addToast} t={t} lang={lang}/>}
      {page==='admin' && user && isAdmin && <AdminPanel user={user} setPage={setPageSafe} addToast={addToast}/>}
      {page==='profile' && user && <ProfilePage user={user} setPage={setPageSafe} addToast={addToast}/>}
      {page==='notifications' && user && <NotificationsPage user={user} onNotifRead={() => setNotifCount(NotifService.unreadCount(user.id))}/>}
      <ToastContainer toasts={toasts}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
