        <div className="admin-content">
          {section === 'dashboard' && (
            <div>
              <div className="admin-header"><div className="admin-title">Dashboard</div><div style={{fontSize:12,color:'var(--warm-gray)'}}>{new Date().toLocaleDateString('es-ES',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div></div>
              <div className="admin-stats-grid">
                <div className="admin-stat-card"><div className="admin-stat-num">{stats.activeProps}</div><div className="admin-stat-label">Propiedades activas</div><div className="admin-stat-trend admin-stat-up">↑ de {stats.totalProps} totales</div></div>
                <div className="admin-stat-card"><div className="admin-stat-num">{stats.totalViews.toLocaleString()}</div><div className="admin-stat-label">Visitas totales</div><div className="admin-stat-trend admin-stat-up">↑ 12% este mes</div></div>
                <div className="admin-stat-card"><div className="admin-stat-num" style={{color:'var(--danger)'}}>{stats.pendingContacts}</div><div className="admin-stat-label">Solicitudes pendientes</div><div className="admin-stat-trend">{stats.totalContacts} totales</div></div>
                <div className="admin-stat-card"><div className="admin-stat-num">{stats.totalUsers}</div><div className="admin-stat-label">Usuarios registrados</div><div className="admin-stat-trend admin-stat-up">↑ 3 este mes</div></div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1.5rem'}}>
                <div className="admin-table-wrap">
                  <div className="admin-table-header"><div className="admin-table-title">Últimas solicitudes</div><button className="admin-btn admin-btn-sm" onClick={()=>setSection('contacts')}>Ver todas</button></div>
                  <table><thead><tr><th>Cliente</th><th>Tipo</th><th>Estado</th></tr></thead><tbody>
                    {ContactService.list().slice(0,4).map(c => (
                      <tr key={c.id}><td>{c.name}</td><td style={{textTransform:'capitalize'}}>{c.tipo}</td><td><span className={`status-badge status-${c.status.toLowerCase()}`}>{c.status}</span></td></tr>
                    ))}
                  </tbody></table>
                </div>
                <div className="admin-table-wrap">
                  <div className="admin-table-header"><div className="admin-table-title">Propiedades más vistas</div><button className="admin-btn admin-btn-sm" onClick={()=>setSection('properties')}>Ver todas</button></div>
                  <table><thead><tr><th>Propiedad</th><th>Vistas</th><th>Estado</th></tr></thead><tbody>
                    {[...PropertyService.list({})].sort((a,b)=>(b.views||0)-(a.views||0)).slice(0,4).map(p => (
                      <tr key={p.id}><td style={{maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.title}</td><td style={{color:'var(--gold)',fontWeight:500}}>{p.views||0}</td><td><span className={`status-badge status-${p.status?.toLowerCase()||'active'}`}>{p.status||'ACTIVE'}</span></td></tr>
                    ))}
                  </tbody></table>
                </div>
              </div>
            </div>
          )}

          {section === 'properties' && (
            <div>
              <div className="admin-header">
                <div className="admin-title">Viviendas</div>
                <button className="admin-btn" onClick={handleNewProp}>+ Nueva propiedad</button>
              </div>
              <div className="admin-table-wrap">
                <table>
                  <thead><tr><th>Ref.</th><th>Título</th><th>Tipo</th><th>Precio</th><th>M²</th><th>Estado</th><th>Vistas</th><th>Acciones</th></tr></thead>
                  <tbody>
                    {properties.map(p => (
                      <tr key={p.id}>
                        <td style={{fontSize:11,color:'var(--warm-gray)'}}>NV-{String(p.id).padStart(4,'0')}</td>
                        <td style={{maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontWeight:500}}>{p.title}</td>
                        <td><span style={{textTransform:'capitalize',fontSize:11}}>{p.tipo}</span></td>
                        <td style={{color:'var(--dark)',fontWeight:500}}>{p.priceLabel}</td>
                        <td>{p.m2} m²</td>
                        <td><span className={`status-badge status-${(p.status||'active').toLowerCase()}`}>{p.status||'ACTIVE'}</span></td>
                        <td style={{color:'var(--gold)'}}>{p.views||0}</td>
                        <td>
                          <div style={{display:'flex',gap:4}}>
                            <button className="admin-btn admin-btn-sm admin-btn-outline" onClick={() => handleEditProp(p)}>✏️</button>
                            <button className="admin-btn admin-btn-sm admin-btn-danger" onClick={() => handleDeleteProp(p.id)}>🗑️</button>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {section === 'contacts' && (
            <div>
              <div className="admin-header">
                <div className="admin-title">Contactos & Reservas</div>
                <input className="admin-form-input" style={{width:240}} placeholder="Buscar por nombre o email..." value={searchContacts} onChange={e=>setSearchContacts(e.target.value)}/>
              </div>
              <div className="admin-table-wrap">
                <table>
                  <thead><tr><th>Cliente</th><th>Email</th><th>Propiedad</th><th>Tipo</th><th>Idioma</th><th>Estado</th><th>Fecha</th><th>Acción</th></tr></thead>
                  <tbody>
                    {filteredContacts.map(c => (
                      <tr key={c.id}>
                        <td style={{fontWeight:500}}>{c.name}</td>
                        <td style={{fontSize:12,color:'var(--warm-gray)'}}>{c.email}</td>
                        <td style={{fontSize:12}}>{c.propertyId ? `NV-${String(c.propertyId).padStart(4,'0')}` : '—'}</td>
                        <td style={{textTransform:'capitalize',fontSize:11}}>{c.tipo}</td>
                        <td style={{fontSize:12,textTransform:'uppercase'}}>{c.language||'es'}</td>
                        <td>
                          <select className="filter-select" value={c.status} onChange={e=>{ContactService.updateStatus(c.id,e.target.value);refresh();}} style={{fontSize:11}}>
                            <option value="PENDING">PENDING</option>
                            <option value="CONTACTED">CONTACTED</option>
                            <option value="CLOSED">CLOSED</option>
                          </select>
                        </td>
                        <td style={{fontSize:11,color:'var(--warm-gray)'}}>{new Date(c.createdAt).toLocaleDateString()}</td>
                        <td><button className="admin-btn admin-btn-sm admin-btn-outline" title={c.message} onClick={()=>alert(`Mensaje:\n\n${c.message}`)}>👁</button></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {section === 'users' && (
            <div>
              <div className="admin-header"><div className="admin-title">Usuarios</div></div>
              <div className="admin-table-wrap">
                <table>
                  <thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Idioma</th><th>Creado</th><th>Acción</th></tr></thead>
                  <tbody>
                    {users.map(u => (
                      <tr key={u.id}>
                        <td style={{fontWeight:500,display:'flex',alignItems:'center',gap:8}}>
                          <div style={{width:28,height:28,borderRadius:'50%',background:'var(--dark)',color:'var(--cream)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,flexShrink:0,fontWeight:500}}>{u.name.substring(0,2).toUpperCase()}</div>
                          {u.name}
                        </td>
                        <td style={{fontSize:12,color:'var(--warm-gray)'}}>{u.email}</td>
                        <td><span className={`status-badge ${u.role==='ADMIN'?'status-active':u.role==='AGENT'?'status-pending':'status-inactive'}`}>{u.role}</span></td>
                        <td style={{fontSize:12,textTransform:'uppercase'}}>{u.lang||'es'}</td>
                        <td style={{fontSize:11,color:'var(--warm-gray)'}}>{new Date(u.createdAt).toLocaleDateString()}</td>
                        <td>
                          <select className="filter-select" defaultValue={u.role} onChange={e=>{const us=DB.get('users');DB.set('users',us.map(x=>x.id===u.id?{...x,role:e.target.value}:x));refresh();addToast({icon:'✅',msg:'Rol actualizado'});}} style={{fontSize:11}}>
                            <option value="USER">USER</option>
                            <option value="AGENT">AGENT</option>
                            <option value="ADMIN">ADMIN</option>
                          </select>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {section === 'notifications' && (
            <div>
              <div className="admin-header">
                <div className="admin-title">Centro de Notificaciones</div>
                <button className="admin-btn" onClick={() => { NotifService.markAllRead(user.id); addToast({icon:'✅',msg:'Todas marcadas como leídas'}); }}>Marcar todas leídas</button>
              </div>
              <div className="notif-list">
                {NotifService.list(user.id).map(n => (
                  <div key={n.id} className={`notif-item ${!n.read?'unread':''}`}>
                    <div className="notif-icon">{n.type==='new_contact'?'📩':n.type==='welcome'?'🎉':'🔔'}</div>
                    <div className="notif-body">
                      <div className="notif-title">{n.title}</div>
                      <div className="notif-msg">{n.message}</div>
                      <div className="notif-time">{new Date(n.createdAt).toLocaleString()}</div>
                    </div>
                    {!n.read && <div style={{width:8,height:8,borderRadius:'50%',background:'var(--gold)',flexShrink:0,marginTop:6}}/>}
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════════════════
function App() {
  const [loading, setLoading] = useState(true);
  const [page, setPage] = useState('home');
  const [detailId, setDetailId] = useState(null);
  const [toasts, setToasts] = useState([]);
  const [lang, setLang] = useState(() => localStorage.getItem('nova_lang') || 'es');
  const { user, login, register, logout, isAdmin } = useAuth();
  const t = useT(lang);
  const [notifCount, setNotifCount] = useState(() => user ? NotifService.unreadCount(user.id) : 0);

  const favs = useMemo(() => {
    if (!user) return JSON.parse(localStorage.getItem('nova_guest_favs') || '[]');
    return FavService.get(user.id);
  }, [user, page]);

  useEffect(() => { setTimeout(() => setLoading(false), 2000); }, []);
  useEffect(() => { window.scrollTo({top:0,behavior:'smooth'}); }, [page]);
  useEffect(() => { localStorage.setItem('nova_lang', lang); }, [lang]);
  useEffect(() => { if (user) setNotifCount(NotifService.unreadCount(user.id)); }, [user, page]);

  const addToast = useCallback(t => {
    const id = Date.now();
    setToasts(ts => [...ts, {...t, id}]);
    setTimeout(() => setToasts(ts => ts.filter(x => x.id !== id)), 3000);
  }, []);

  const toggleFav = useCallback(propId => {
    if (user) {
      FavService.toggle(user.id, propId);
    } else {
      const gf = JSON.parse(localStorage.getItem('nova_guest_favs')||'[]');
      const updated = gf.includes(propId) ? gf.filter(f=>f!==propId) : [...gf, propId];
      localStorage.setItem('nova_guest_favs', JSON.stringify(updated));
    }
  }, [user]);

  const setPageSafe = useCallback(p => {
    if ((p==='admin') && !isAdmin) { addToast({icon:'🔒',msg:'Acceso restringido a administradores'}); return; }
    setPage(p);
  }, [isAdmin]);

  return (
    <>
      {loading && (
        <div className="loader-overlay">
          <div className="loader-logo">NOVA</div>
          <div className="loader-line"/>
          <div className="loader-sub">Portal Inmobiliario</div>
        </div>
      )}
      <Navbar page={page} setPage={setPageSafe} favCount={favs.length} user={user} logout={logout} lang={lang} setLang={setLang} notifCount={notifCount} addToast={addToast} t={t}/>
      {page==='home' && <HomePage setPage={setPageSafe} favs={favs} toggleFav={toggleFav} setDetailId={setDetailId} addToast={addToast} t={t} user={user}/>}
      {page==='catalogue' && <CataloguePage favs={favs} toggleFav={toggleFav} setDetailId={setDetailId} setPage={setPageSafe} addToast={addToast} t={t} user={user}/>}
      {page==='detail' && detailId && <DetailPage id={detailId} favs={favs} toggleFav={toggleFav} setPage={setPageSafe} addToast={addToast} t={t} user={user}/>}
      {page==='favs' && <FavsPage favs={favs} toggleFav={toggleFav} setDetailId={setDetailId} setPage={setPageSafe} addToast={addToast} t={t} user={user}/>}
      {page==='auth' && <AuthPage login={login} register={register} setPage={setPageSafe} addToast={addToast} t={t} lang={lang}/>}
      {page==='admin' && user && isAdmin && <AdminPanel user={user} setPage={setPageSafe} addToast={addToast}/>}
      {page==='profile' && user && <ProfilePage user={user} setPage={setPageSafe} addToast={addToast}/>}
      {page==='notifications' && user && <NotificationsPage user={user} onNotifRead={() => setNotifCount(NotifService.unreadCount(user.id))}/>}
      <ToastContainer toasts={toasts}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
