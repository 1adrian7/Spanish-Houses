<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>RURAL VISTA — Portal Inmobiliario</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root{--cream:#F5F0E8;--dark:#1A1714;--gold:#C9A84C;--gold-light:#E8D5A3;--warm-gray:#8B8480;--border:rgba(26,23,20,0.12);--card-bg:#FDFAF5;--font-serif:'Fraunces',Georgia,serif;--font-sans:'Inter',sans-serif;--shadow:0 4px 32px rgba(26,23,20,0.08);--shadow-lg:0 12px 60px rgba(26,23,20,0.14);--transition:all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);--success:#2D6A4F;--danger:#9B2C2C;}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--font-sans);background:var(--cream);color:var(--dark);min-height:100vh;overflow-x:hidden;}
#root{min-height:100vh;}
/* LOADER */
div class="loader-overlay">
    <div class="loader-logo">RURAL VISTA</div>
    <div class="loader-line"></div>
    <div class="loader-sub">Portal inmobiliario</div>
</div>

<style>
.loader-overlay{
    position:fixed;
    inset:0;
    background:var(--dark);
    z-index:9999;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    animation:loaderFade 0.6s ease 1.8s forwards;
}

.loader-logo{
    font-family:var(--font-serif);
    font-size:42px;
    font-weight:300;
    color:var(--cream);
    letter-spacing:0.12em;
    opacity:0;
    animation:logoReveal 0.8s ease 0.3s forwards;
}

.loader-line{
    width:0;
    height:1px;
    background:var(--gold);
    margin-top:16px;
    animation:lineGrow 1s ease 0.8s forwards;
}

.loader-sub{
    font-size:11px;
    letter-spacing:0.3em;
    color:var(--warm-gray);
    margin-top:12px;
    text-transform:uppercase;
    opacity:0;
    animation:logoReveal 0.8s ease 1.2s forwards;
}

@keyframes logoReveal{
    to{
        opacity:1;
    }
}

@keyframes lineGrow{
    to{
        width:160px;
    }
}

@keyframes loaderFade{
    to{
        opacity:0;
        pointer-events:none;
/* NAVBAR */
.navbar{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 2.5rem;height:68px;display:flex;align-items:center;justify-content:space-between;background:rgba(245,240,232,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);transition:var(--transition);}
.navbar.scrolled{height:56px;background:rgba(245,240,232,0.98);}
.nav-logo{font-family:var(--font-serif);font-size:22px;font-weight:300;letter-spacing:0.12em;cursor:pointer;display:flex;align-items:center;gap:8px;}
.nav-logo-dot{width:6px;height:6px;background:var(--gold);border-radius:50%;}
.nav-links{display:flex;align-items:center;gap:2rem;}
.nav-link{font-size:13px;letter-spacing:0.06em;color:var(--warm-gray);cursor:pointer;text-decoration:none;transition:color 0.2s;background:none;border:none;font-family:var(--font-sans);}
.nav-link:hover,.nav-link.active{color:var(--dark);}
.nav-fav-btn{position:relative;background:none;border:none;cursor:pointer;padding:6px;}
.nav-fav-badge{position:absolute;top:0;right:0;background:var(--gold);color:white;font-size:9px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:500;}
.nav-cta{background:var(--dark);color:var(--cream);border:none;padding:0.5rem 1.25rem;font-size:12px;letter-spacing:0.08em;cursor:pointer;font-family:var(--font-sans);transition:var(--transition);}
.nav-cta:hover{background:var(--gold);}
.nav-user-btn{display:flex;align-items:center;gap:8px;background:none;border:1px solid var(--border);padding:6px 12px;cursor:pointer;font-family:var(--font-sans);font-size:12px;color:var(--dark);transition:var(--transition);}
.nav-user-btn:hover{border-color:var(--gold);}
.nav-avatar{width:28px;height:28px;border-radius:50%;background:var(--dark);color:var(--cream);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;}
/* PAGES */
.page{min-height:100vh;padding-top:68px;animation:pageIn 0.5s ease;}
@keyframes pageIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
/* HERO */
.hero{height:calc(100vh - 68px);position:relative;display:flex;align-items:flex-end;justify-content:center;overflow:hidden;}
.hero-bg{position:absolute;inset:0;background:linear-gradient(135deg,#2C2318 0%,#1A1714 50%,#3D2E1E 100%);}
.hero-grid{position:absolute;inset:0;opacity:0.04;background-image:linear-gradient(var(--cream) 1px,transparent 1px),linear-gradient(90deg,var(--cream) 1px,transparent 1px);background-size:60px 60px;}
.hero-accent{position:absolute;top:20%;right:15%;width:320px;height:320px;border:1px solid rgba(201,168,76,0.2);border-radius:50%;animation:pulse 4s ease-in-out infinite;}
.hero-accent2{position:absolute;top:20%;right:15%;width:240px;height:240px;border:1px solid rgba(201,168,76,0.12);border-radius:50%;animation:pulse 4s ease-in-out 1s infinite;}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.05);opacity:0.6;}}
.hero-content{position:relative;z-index:2;padding:0 2.5rem 5rem;max-width:900px;width:100%;}
.hero-tag{font-size:11px;letter-spacing:0.3em;color:var(--gold);text-transform:uppercase;margin-bottom:1rem;}
.hero-title{font-family:var(--font-serif);font-size:clamp(42px,6vw,80px);font-weight:300;color:var(--cream);line-height:1.1;margin-bottom:1.5rem;}
.hero-title em{font-style:italic;color:var(--gold-light);}
.hero-subtitle{font-size:15px;color:rgba(245,240,232,0.6);max-width:460px;line-height:1.7;margin-bottom:2.5rem;}
.hero-actions{display:flex;gap:1rem;flex-wrap:wrap;}
.btn-hero{padding:0.9rem 2.2rem;font-size:13px;letter-spacing:0.1em;cursor:pointer;font-family:var(--font-sans);transition:var(--transition);border:none;text-transform:uppercase;}
.btn-hero-primary{background:var(--gold);color:var(--dark);}
.btn-hero-primary:hover{background:var(--gold-light);transform:translateY(-1px);}
.btn-hero-outline{background:transparent;color:var(--cream);border:1px solid rgba(245,240,232,0.3);}
.btn-hero-outline:hover{border-color:var(--cream);background:rgba(245,240,232,0.05);}
.hero-stats{display:flex;gap:3rem;margin-top:4rem;padding-top:2rem;border-top:1px solid rgba(245,240,232,0.1);}
.hero-stat-num{font-family:var(--font-serif);font-size:32px;font-weight:300;color:var(--cream);}
.hero-stat-label{font-size:11px;letter-spacing:0.2em;color:rgba(245,240,232,0.4);text-transform:uppercase;margin-top:4px;}
/* CATALOGUE */
.catalogue{padding:3rem 2.5rem;max-width:1400px;margin:0 auto;}
.catalogue-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:2.5rem;}
.catalogue-title{font-family:var(--font-serif);font-size:40px;font-weight:300;}
.catalogue-title span{font-style:italic;color:var(--warm-gray);}
.result-count{font-size:13px;color:var(--warm-gray);}
/* FILTERS */
.filters-bar{display:flex;gap:0.75rem;margin-bottom:2rem;flex-wrap:wrap;align-items:center;padding:1.25rem 1.5rem;background:var(--card-bg);border:1px solid var(--border);}
.filter-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:130px;}
.filter-label{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--warm-gray);}
.filter-select{border:none;border-bottom:1px solid var(--border);background:transparent;font-family:var(--font-sans);font-size:13px;color:var(--dark);padding:4px 0;cursor:pointer;outline:none;appearance:none;}
.filter-search{flex:2;min-width:200px;}
.filter-search input{width:100%;border:none;border-bottom:1px solid var(--border);background:transparent;font-family:var(--font-sans);font-size:13px;padding:4px 0;outline:none;color:var(--dark);}
.filter-search input::placeholder{color:var(--warm-gray);}
.filter-btn-apply{background:var(--dark);color:var(--cream);border:none;padding:0.6rem 1.5rem;font-size:12px;letter-spacing:0.1em;cursor:pointer;font-family:var(--font-sans);text-transform:uppercase;transition:var(--transition);flex-shrink:0;}
.filter-btn-apply:hover{background:var(--gold);color:var(--dark);}
.filter-btn-clear{background:none;border:1px solid var(--border);color:var(--warm-gray);padding:0.6rem 1rem;font-size:12px;cursor:pointer;font-family:var(--font-sans);transition:var(--transition);flex-shrink:0;}
.filter-btn-clear:hover{border-color:var(--dark);color:var(--dark);}
/* CARDS */
.properties-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1.5rem;}
.property-card{background:var(--card-bg);border:1px solid var(--border);cursor:pointer;overflow:hidden;transition:var(--transition);animation:cardIn 0.5s ease both;}
.property-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:var(--gold-light);}
@keyframes cardIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.card-img-wrap{position:relative;height:220px;overflow:hidden;background:#2C2318;}
.card-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;transition:transform 0.6s ease;font-size:60px;}
.property-card:hover .card-img-placeholder{transform:scale(1.04);}
.card-badge{position:absolute;top:16px;left:16px;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;padding:4px 12px;font-weight:500;}
.badge-venta{background:var(--dark);color:var(--cream);}
.badge-alquiler{background:var(--gold);color:var(--dark);}
.badge-nuevo{background:#2D6A4F;color:white;}
.card-fav{position:absolute;top:14px;right:14px;background:rgba(245,240,232,0.9);border:none;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:var(--transition);border-radius:50%;font-size:15px;}
.card-fav:hover,.card-fav.active{background:var(--dark);}
.card-360{position:absolute;bottom:12px;right:12px;background:rgba(26,23,20,0.7);color:var(--cream);font-size:10px;letter-spacing:0.1em;padding:4px 10px;}
.card-body{padding:1.25rem 1.5rem 1.5rem;}
.card-price{font-family:var(--font-serif);font-size:26px;font-weight:300;margin-bottom:4px;}
.card-price-sub{font-size:11px;color:var(--warm-gray);margin-bottom:0.75rem;letter-spacing:0.05em;}
.card-title{font-size:14px;font-weight:500;margin-bottom:4px;}
.card-location{font-size:12px;color:var(--warm-gray);margin-bottom:1rem;display:flex;align-items:center;gap:4px;}
.card-details{display:flex;gap:1rem;font-size:12px;color:var(--warm-gray);padding-top:1rem;border-top:1px solid var(--border);}
.card-actions{display:flex;gap:8px;margin-top:1rem;}
.card-btn{flex:1;padding:0.6rem;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;font-family:var(--font-sans);border:1px solid var(--border);background:none;color:var(--dark);transition:var(--transition);}
.card-btn:hover{background:var(--dark);color:var(--cream);border-color:var(--dark);}
.card-btn-primary{background:var(--dark);color:var(--cream);border-color:var(--dark);}
.card-btn-primary:hover{background:var(--gold);border-color:var(--gold);color:var(--dark);}
/* DETAIL */
.detail-page{max-width:1400px;margin:0 auto;padding:2rem 2.5rem 4rem;}
.detail-back{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--warm-gray);cursor:pointer;border:none;background:none;font-family:var(--font-sans);padding:0;margin-bottom:2rem;transition:color 0.2s;}
.detail-back:hover{color:var(--dark);}
.detail-grid{display:grid;grid-template-columns:1fr 380px;gap:3rem;align-items:start;}
.gallery-main{position:relative;height:520px;background:#2C2318;overflow:hidden;margin-bottom:1rem;}
.gallery-main-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.gallery-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(245,240,232,0.9);border:none;width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:var(--transition);z-index:2;}
.gallery-nav:hover{background:var(--cream);}
.gallery-prev{left:16px;}
.gallery-next{right:16px;}
.gallery-counter{position:absolute;bottom:16px;right:16px;background:rgba(26,23,20,0.65);color:var(--cream);font-size:11px;padding:4px 12px;letter-spacing:0.1em;}
.gallery-360-btn{position:absolute;bottom:16px;left:16px;background:var(--gold);color:var(--dark);border:none;padding:8px 16px;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;font-family:var(--font-sans);font-weight:500;transition:var(--transition);display:flex;align-items:center;gap:6px;}
.gallery-360-btn:hover{background:var(--gold-light);}
.gallery-thumbs{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;}
.gallery-thumb{width:80px;height:60px;flex-shrink:0;cursor:pointer;border:2px solid transparent;transition:border-color 0.2s;background:#2C2318;display:flex;align-items:center;justify-content:center;font-size:24px;}
.gallery-thumb.active{border-color:var(--gold);}
.gallery-thumb:hover{border-color:var(--dark);}
/* DETAIL SIDEBAR */
.detail-sidebar{display:flex;flex-direction:column;gap:1.5rem;}
.detail-price-card{background:var(--dark);color:var(--cream);padding:2rem;}
.detail-badge{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:0.5rem;}
.detail-price{font-family:var(--font-serif);font-size:42px;font-weight:300;line-height:1;margin-bottom:0.25rem;}
.detail-price-note{font-size:12px;color:rgba(245,240,232,0.5);margin-bottom:1.5rem;}
.detail-cta{width:100%;background:var(--gold);color:var(--dark);border:none;padding:1rem;font-size:12px;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;font-family:var(--font-sans);font-weight:500;margin-bottom:0.75rem;transition:var(--transition);}
.detail-cta:hover{background:var(--gold-light);}
.detail-cta-outline{background:transparent;border:1px solid rgba(245,240,232,0.25);color:var(--cream);}
.detail-cta-outline:hover{border-color:var(--cream);background:rgba(245,240,232,0.05);}
.detail-info-card{background:var(--card-bg);border:1px solid var(--border);padding:1.5rem;}
.detail-info-title{font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--warm-gray);margin-bottom:1rem;}
.detail-info-row{display:flex;justify-content:space-between;align-items:center;padding:0.6rem 0;border-bottom:1px solid var(--border);font-size:13px;}
.detail-info-row:last-child{border-bottom:none;}
.detail-info-label{color:var(--warm-gray);}
.detail-info-value{font-weight:500;}
.detail-agent-card{background:var(--card-bg);border:1px solid var(--border);padding:1.5rem;display:flex;align-items:center;gap:1rem;}
.agent-avatar{width:52px;height:52px;border-radius:50%;background:var(--dark);display:flex;align-items:center;justify-content:center;font-family:var(--font-serif);font-size:20px;font-weight:300;color:var(--cream);flex-shrink:0;}
.agent-name{font-weight:500;font-size:14px;margin-bottom:2px;}
.agent-role{font-size:11px;color:var(--warm-gray);}
.agent-phone{font-size:12px;color:var(--gold);margin-top:6px;}
.detail-title{font-family:var(--font-serif);font-size:36px;font-weight:300;margin-bottom:0.5rem;line-height:1.2;}
.detail-location{font-size:14px;color:var(--warm-gray);margin-bottom:1.5rem;display:flex;align-items:center;gap:6px;}
.detail-features{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);margin-bottom:2rem;}
.detail-feature{background:var(--card-bg);padding:1.25rem;text-align:center;}
.detail-feature-icon{font-size:20px;margin-bottom:6px;}
.detail-feature-value{font-family:var(--font-serif);font-size:22px;font-weight:300;}
.detail-feature-label{font-size:10px;letter-spacing:0.1em;color:var(--warm-gray);text-transform:uppercase;margin-top:2px;}
.detail-section-title{font-family:var(--font-serif);font-size:22px;font-weight:300;margin-bottom:1rem;padding-top:2rem;border-top:1px solid var(--border);}
.detail-desc{font-size:14px;line-height:1.8;color:#4A4540;max-width:640px;margin-bottom:1.5rem;}
.amenities-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:2rem;}
.amenity{display:flex;align-items:center;gap:8px;font-size:13px;padding:0.6rem 0;}
.amenity-check{width:18px;height:18px;background:var(--dark);display:flex;align-items:center;justify-content:center;color:var(--cream);font-size:10px;flex-shrink:0;}
/* MAP */
.detail-map{height:240px;background:linear-gradient(135deg,#E8E0D0,#D4C9B8);position:relative;overflow:hidden;border:1px solid var(--border);}
.map-grid{position:absolute;inset:0;opacity:0.5;background-image:linear-gradient(rgba(26,23,20,0.1) 1px,transparent 1px),linear-gradient(90deg,rgba(26,23,20,0.1) 1px,transparent 1px);background-size:40px 40px;}
.map-pin{position:absolute;top:50%;left:50%;transform:translate(-50%,-100%);font-size:32px;animation:mapBounce 1s ease 0.5s both;}
@keyframes mapBounce{from{transform:translate(-50%,-80%) scale(0);opacity:0;}to{transform:translate(-50%,-100%) scale(1);opacity:1;}}
.map-label{position:absolute;top:50%;left:50%;transform:translate(-50%,10px);background:var(--dark);color:var(--cream);font-size:11px;letter-spacing:0.1em;padding:4px 12px;white-space:nowrap;}
/* TOUR 360 */
.tour-overlay{position:fixed;inset:0;z-index:200;background:var(--dark);display:flex;flex-direction:column;}
.tour-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid rgba(245,240,232,0.1);flex-shrink:0;}
.tour-title{font-family:var(--font-serif);font-size:20px;color:var(--cream);font-weight:300;}
.tour-close{background:none;border:none;color:var(--cream);font-size:24px;cursor:pointer;padding:4px 8px;}
.tour-viewport{flex:1;position:relative;overflow:hidden;cursor:grab;}
.tour-viewport:active{cursor:grabbing;}
.tour-panorama{position:absolute;top:0;height:100%;display:flex;align-items:center;transition:none;}
.tour-element{position:absolute;display:flex;flex-direction:column;align-items:center;gap:8px;}
.tour-element-dot{width:28px;height:28px;border-radius:50%;background:rgba(201,168,76,0.3);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;animation:tourPulse 2s infinite;}
.tour-element-dot::after{content:'';width:8px;height:8px;background:var(--gold);border-radius:50%;}
@keyframes tourPulse{0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,0.4);}50%{box-shadow:0 0 0 12px rgba(201,168,76,0);}}
.tour-element-label{font-size:11px;letter-spacing:0.1em;color:var(--gold-light);background:rgba(26,23,20,0.8);padding:4px 10px;white-space:nowrap;}
.tour-rooms{display:flex;gap:8px;padding:1rem 2rem;border-top:1px solid rgba(245,240,232,0.1);flex-shrink:0;overflow-x:auto;}
.tour-room-btn{background:none;border:1px solid rgba(245,240,232,0.15);color:var(--cream);padding:6px 16px;font-size:11px;letter-spacing:0.1em;cursor:pointer;font-family:var(--font-sans);text-transform:uppercase;transition:var(--transition);white-space:nowrap;}
.tour-room-btn:hover,.tour-room-btn.active{background:var(--gold);border-color:var(--gold);color:var(--dark);}
.tour-hint{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(26,23,20,0.7);color:rgba(245,240,232,0.6);font-size:11px;letter-spacing:0.1em;padding:6px 16px;pointer-events:none;}
/* FAVOURITES */
.favs-page{max-width:1400px;margin:0 auto;padding:3rem 2.5rem;}
.favs-title{font-family:var(--font-serif);font-size:40px;font-weight:300;margin-bottom:2rem;}
.favs-empty{text-align:center;padding:5rem 2rem;}
.favs-empty-icon{font-size:60px;margin-bottom:1rem;opacity:0.3;}
.favs-empty-text{font-family:var(--font-serif);font-size:24px;font-weight:300;color:var(--warm-gray);margin-bottom:0.5rem;}
.favs-empty-sub{font-size:14px;color:var(--warm-gray);margin-bottom:2rem;}
.btn-outline{background:none;border:1px solid var(--dark);color:var(--dark);padding:0.75rem 2rem;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;font-family:var(--font-sans);transition:var(--transition);}
.btn-outline:hover{background:var(--dark);color:var(--cream);}
/* TOAST */
.toast-container{position:fixed;bottom:2rem;right:2rem;z-index:500;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{background:var(--dark);color:var(--cream);padding:0.75rem 1.25rem;font-size:13px;letter-spacing:0.05em;display:flex;align-items:center;gap:10px;animation:toastIn 0.3s ease,toastOut 0.3s ease 2.7s forwards;pointer-events:all;min-width:260px;}
@keyframes toastIn{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
@keyframes toastOut{to{transform:translateY(20px);opacity:0;}}
.toast-icon{font-size:16px;flex-shrink:0;}
.toast-gold{background:var(--gold);color:var(--dark);}
/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:300;background:rgba(26,23,20,0.7);display:flex;align-items:center;justify-content:center;padding:1rem;animation:fadeIn 0.2s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal{background:var(--cream);max-width:480px;width:100%;padding:2.5rem;animation:modalIn 0.3s ease;position:relative;max-height:90vh;overflow-y:auto;}
@keyframes modalIn{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-close{position:absolute;top:1.25rem;right:1.25rem;background:none;border:none;font-size:20px;cursor:pointer;color:var(--warm-gray);}
.modal-close:hover{color:var(--dark);}
.modal-title{font-family:var(--font-serif);font-size:28px;font-weight:300;margin-bottom:0.25rem;}
.modal-sub{font-size:13px;color:var(--warm-gray);margin-bottom:2rem;}
.modal-form-group{margin-bottom:1rem;}
.modal-label{display:block;font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--warm-gray);margin-bottom:6px;}
.modal-input{width:100%;border:none;border-bottom:1px solid var(--border);background:transparent;font-family:var(--font-sans);font-size:14px;padding:8px 0;outline:none;color:var(--dark);transition:border-color 0.2s;}
.modal-input:focus{border-color:var(--dark);}
.modal-dates{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.modal-submit{width:100%;background:var(--dark);color:var(--cream);border:none;padding:1rem;font-size:12px;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;font-family:var(--font-sans);margin-top:0.5rem;transition:var(--transition);}
.modal-submit:hover{background:var(--gold);color:var(--dark);}
.modal-success{text-align:center;padding:2rem 0;}
.modal-success-icon{font-size:48px;margin-bottom:1rem;}
.modal-success-title{font-family:var(--font-serif);font-size:26px;font-weight:300;margin-bottom:0.5rem;}
.modal-success-sub{font-size:13px;color:var(--warm-gray);}
.modal-error{background:rgba(155,44,44,0.08);border:1px solid rgba(155,44,44,0.2);color:#9B2C2C;padding:0.75rem 1rem;font-size:13px;margin-bottom:1rem;}
/* ADMIN */
.admin-layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 68px);}
.admin-sidebar{background:var(--dark);padding:2rem 0;display:flex;flex-direction:column;gap:4px;}
.admin-sidebar-title{font-size:10px;letter-spacing:0.25em;color:rgba(245,240,232,0.3);text-transform:uppercase;padding:0 1.5rem;margin-bottom:0.5rem;margin-top:1rem;}
.admin-nav-item{display:flex;align-items:center;gap:10px;padding:0.6rem 1.5rem;font-size:13px;color:rgba(245,240,232,0.6);cursor:pointer;transition:all 0.2s;border:none;background:none;font-family:var(--font-sans);width:100%;text-align:left;}
.admin-nav-item:hover,.admin-nav-item.active{color:var(--cream);background:rgba(245,240,232,0.08);}
.admin-nav-item.active{border-left:2px solid var(--gold);}
.admin-content{padding:2.5rem;overflow-y:auto;}
.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;}

.admin-table-wrap{background:var(--card-bg);border:1px solid var(--border);overflow:hidden;}

.admin-table-title{font-size:14px;font-weight:500;}
.admin-btn{background:var(--dark);color:var(--cream);border:none;padding:0.5rem 1.25rem;font-size:12px;letter-spacing:0.08em;cursor:pointer;font-family:var(--font-sans);transition:var(--transition);}

.status-badge{display:inline-flex;align-items:center;padding:3px 10px;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;font-weight:500;}

.status-pending{background:rgba(201,168,76,0.15);color:#8B6914;}
.status-inactive{background:rgba(139,132,128,0.15);color:var(--warm-gray);}
.status-sold{background:rgba(26,23,20,0.1);color:var(--dark);}
/* FORM in admin */
.admin-form{display:flex;flex-direction:column;gap:1rem;}

.admin-form-input{border:1px solid var(--border);background:white;font-family:var(--font-sans);font-size:13px;padding:0.6rem 0.85rem;outline:none;color:var(--dark);transition:border-color 0.2s;}

.lang-btn.active{background:var(--dark);color:var(--cream);border-color:var(--dark);}
/* UPLOAD ZONE */
.upload-zone{border:2px dashed var(--border);padding:2rem;text-align:center;cursor:pointer;transition:var(--transition);}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--gold);background:rgba(201,168,76,0.05);}
.upload-zone input{display:none;}
.upload-preview{display:flex;flex-wrap:wrap;gap:8px;margin-top:1rem;}
.upload-thumb{width:80px;height:60px;background:#2C2318;display:flex;align-items:center;justify-content:center;font-size:24px;position:relative;overflow:hidden;}
.upload-thumb-del{position:absolute;top:2px;right:2px;background:var(--danger);color:white;border:none;width:16px;height:16px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
/* NOTIFICATIONS PANEL */
.notif-list{display:flex;flex-direction:column;gap:8px;}
.notif-item{background:var(--card-bg);border:1px solid var(--border);padding:1rem 1.25rem;display:flex;align-items:flex-start;gap:12px;}

/* AUTH */

.auth-tabs{display:flex;gap:0;margin-bottom:2rem;border-bottom:1px solid var(--border);}

/* PROFILE PAGE */

.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem;}
.profile-section-title{font-family:var(--font-serif);font-size:20px;font-weight:300;margin-bottom:1.25rem;padding-bottom:0.75rem;border-bottom:1px solid var(--border);}
/* SCROLLBAR */

/* RESPONSIVE */
@media(max-width:1100px){.admin-stats-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:900px){.detail-grid,.admin-layout,.profile-grid{grid-template-columns:1fr;}.navbar{padding:0 1.25rem;}.nav-links{display:none;}.catalogue,.detail-page,.favs-page,.profile-page{padding:2rem 1.25rem;}.hero-title{font-size:36px;}.detail-features{grid-template-columns:repeat(2,1fr);}.amenities-grid{grid-template-columns:repeat(2,1fr);}.admin-stats-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:600px){.properties-grid{grid-template-columns:1fr;}.filters-bar{flex-direction:column;}.gallery-main{height:280px;}.admin-stats-grid{grid-template-columns:1fr;}.admin-form-row{grid-template-columns:1fr;}}

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ═══════════════════════════════════════════════════════════════════
// BACKEND SIMULADO — JWT + DB + Auth + Storage + Notifications
// ═══════════════════════════════════════════════════════════════════

// ─── Utilidades JWT ─────────────────────────────────────────────────
const JWT = {
  sign(payload, secret = 'nova_jwt_secret_2025') {
    const header = btoa(JSON.stringify({ alg: 'HS256', typ: 'JWT' }));
    const body = btoa(JSON.stringify({ ...payload, iat: Date.now(), exp: Date.now() + 7*24*60*60*1000 }));
    const sig = btoa(secret + body).substring(0, 20);
    return `${header}.${body}.${sig}`;
  },
  verify(token) {
    try {
      const parts = token.split('.');
      if (parts.length !== 3) return null;
      const payload = JSON.parse(atob(parts[1]));
      if (payload.exp < Date.now()) return null;
      return payload;
    } catch { return null; }
  },
};

// ─── Base de datos simulada (localStorage) ─────────────────────────
const DB = {
  get: (k, def = []) => { try { return JSON.parse(localStorage.getItem('nova_'+k)) ?? def; } catch { return def; } },
  set: (k, v) => { localStorage.setItem('nova_'+k, JSON.stringify(v)); },
  init() {
    // Usuarios: solo se crean si no existen
    if (!this.get('users_init', false)) {
      this.set('users', [
        { id: 'u1', name: 'Admin Nova', email: 'admin@nova.com', password: 'admin123', role: 'ADMIN', avatar: null, createdAt: new Date().toISOString(), lang: 'es' },
        { id: 'u2', name: 'Elena Morales', email: 'elena@nova.com', password: 'agent123', role: 'AGENT', avatar: null, createdAt: new Date().toISOString(), lang: 'es' },
        { id: 'u3', name: 'James Wilson', email: 'james@gmail.com', password: 'user123', role: 'USER', avatar: null, createdAt: new Date().toISOString(), lang: 'en' },
      ]);
      this.set('users_init', true);
    }
    // Propiedades: solo se inicializan si NO hay ninguna guardada — preserva las creadas desde el admin
    if (!localStorage.getItem('nova_properties')) {
      this.set('properties', INITIAL_PROPERTIES);
    }
    // Resto: solo la primera vez
    if (!this.get('initialized', false)) {
      this.set('contacts', [
        { id: 'c1', name: 'Sarah Thompson', email: 'sarah@gmail.com', phone: '+44 7700 900123', propertyId: '1', message: 'Interested in the penthouse. Can I arrange a viewing?', tipo: 'visita', status: 'PENDING', createdAt: new Date(Date.now()-86400000).toISOString(), language: 'en' },
        { id: 'c2', name: 'Klaus Müller', email: 'k.muller@web.de', phone: '+49 151 12345678', propertyId: '3', message: 'Suche nach einem Haus mit Pool. Wann ist eine Besichtigung möglich?', tipo: 'visita', status: 'CONTACTED', createdAt: new Date(Date.now()-172800000).toISOString(), language: 'de' },
        { id: 'c3', name: 'Ana García', email: 'ana@hotmail.com', phone: '+34 666 123456', propertyId: '2', message: 'Me interesa el piso modernista. Precio negociable?', tipo: 'info', status: 'PENDING', createdAt: new Date(Date.now()-3600000).toISOString(), language: 'es' },
      ]);
      this.set('notifications', [
        { id: 'n1', userId: 'u1', type: 'new_contact', title: 'Nueva solicitud de visita', message: 'Sarah Thompson quiere visitar el Ático de lujo', read: false, createdAt: new Date(Date.now()-86400000).toISOString() },
        { id: 'n2', userId: 'u1', type: 'new_contact', title: 'Consulta de cliente', message: 'Klaus Müller pregunta por el chalet con piscina', read: false, createdAt: new Date(Date.now()-172800000).toISOString() },
        { id: 'n3', userId: 'u1', type: 'system', title: 'Bienvenido a NOVA', message: 'Tu plataforma inmobiliaria está lista', read: true, createdAt: new Date(Date.now()-604800000).toISOString() },
      ]);
      if (!localStorage.getItem('nova_favorites')) this.set('favorites', {});
      this.set('initialized', true);
    }
  },
};

// ─── Auth Service ───────────────────────────────────────────────────
const AuthService = {
  login(email, password) {
    const users = DB.get('users');
    const user = users.find(u => u.email === email && u.password === password);
    if (!user) return { error: 'Credenciales incorrectas' };
    const { password: _, ...safeUser } = user;
    const token = JWT.sign({ id: user.id, email: user.email, role: user.role, name: user.name });
    return { token, user: safeUser };
  },
  register(name, email, password, lang = 'es') {
    const users = DB.get('users');
    if (users.find(u => u.email === email)) return { error: 'Este email ya está registrado' };
    const newUser = { id: 'u' + Date.now(), name, email, password, role: 'USER', avatar: null, createdAt: new Date().toISOString(), lang };
    DB.set('users', [...users, newUser]);
    const { password: _, ...safeUser } = newUser;
    const token = JWT.sign({ id: newUser.id, email, role: 'USER', name });
    const notifs = DB.get('notifications');
    DB.set('notifications', [...notifs, { id: 'n'+Date.now(), userId: newUser.id, type: 'welcome', title: '¡Bienvenido a NOVA!', message: 'Tu cuenta ha sido creada con éxito.', read: false, createdAt: new Date().toISOString() }]);
    return { token, user: safeUser };
  },
  me(token) {
    const payload = JWT.verify(token);
    if (!payload) return null;
    const users = DB.get('users');
    const user = users.find(u => u.id === payload.id);
    if (!user) return null;
    const { password: _, ...safeUser } = user;
    return safeUser;
  },
};

// ─── Property Service ────────────────────────────────────────────────
const PropertyService = {
  list(filters = {}) {
    let props = DB.get('properties', INITIAL_PROPERTIES);
    if (filters.tipo) props = props.filter(p => p.tipo === filters.tipo);
    if (filters.district) props = props.filter(p => p.district?.toLowerCase().includes(filters.district.toLowerCase()));
    if (filters.maxPrice) props = props.filter(p => p.price <= Number(filters.maxPrice));
    if (filters.minM2) props = props.filter(p => p.m2 >= Number(filters.minM2));
    if (filters.search) {
      const q = filters.search.toLowerCase();
      props = props.filter(p => p.title.toLowerCase().includes(q) || p.location.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q));
    }
    if (filters.status && filters.status !== 'all') props = props.filter(p => p.status === filters.status);
    return props;
  },
  getById(id) { return DB.get('properties', INITIAL_PROPERTIES).find(p => p.id === String(id)); },
  create(data) {
    const props = DB.get('properties', INITIAL_PROPERTIES);
    const newProp = { ...data, id: String(Date.now()), createdAt: new Date().toISOString(), status: 'ACTIVE', views: 0 };
    DB.set('properties', [...props, newProp]);
    return newProp;
  },
  update(id, data) {
    const props = DB.get('properties', INITIAL_PROPERTIES);
    const updated = props.map(p => p.id === String(id) ? { ...p, ...data, updatedAt: new Date().toISOString() } : p);
    DB.set('properties', updated);
    return updated.find(p => p.id === String(id));
  },
  delete(id) {
    const props = DB.get('properties', INITIAL_PROPERTIES);
    DB.set('properties', props.filter(p => p.id !== String(id)));
    return { success: true };
  },
};

// ─── Contact Service ─────────────────────────────────────────────────
const ContactService = {
  submit(data) {
    const contacts = DB.get('contacts');
    const newContact = { ...data, id: 'c'+Date.now(), status: 'PENDING', createdAt: new Date().toISOString() };
    DB.set('contacts', [...contacts, newContact]);
    // Simular email de notificación
    const notifs = DB.get('notifications');
    DB.set('notifications', [...notifs, { id: 'n'+Date.now(), userId: 'u1', type: 'new_contact', title: 'Nueva solicitud recibida', message: `${data.name} ha enviado una solicitud de ${data.tipo}`, read: false, createdAt: new Date().toISOString() }]);
    return newContact;
  },
  list() { return DB.get('contacts').sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)); },
  updateStatus(id, status) {
    const contacts = DB.get('contacts');
    DB.set('contacts', contacts.map(c => c.id === id ? { ...c, status } : c));
  },
};

// ─── Favorites Service ────────────────────────────────────────────────
const FavService = {
  get(userId) { return DB.get('favorites')[userId] || []; },
  toggle(userId, propId) {
    const favs = DB.get('favorites');
    const userFavs = favs[userId] || [];
    favs[userId] = userFavs.includes(propId) ? userFavs.filter(f => f !== propId) : [...userFavs, propId];
    DB.set('favorites', favs);
    return favs[userId];
  },
};

// ─── Notification Service ─────────────────────────────────────────────
const NotifService = {
  list(userId) { return DB.get('notifications').filter(n => n.userId === userId).sort((a,b) => new Date(b.createdAt)-new Date(a.createdAt)); },
  markRead(id) {
    const notifs = DB.get('notifications');
    DB.set('notifications', notifs.map(n => n.id === id ? { ...n, read: true } : n));
  },
  markAllRead(userId) {
    const notifs = DB.get('notifications');
    DB.set('notifications', notifs.map(n => n.userId === userId ? { ...n, read: true } : n));
  },
  unreadCount(userId) { return DB.get('notifications').filter(n => n.userId === userId && !n.read).length; },
};

// ─── Upload Service (simulado) ────────────────────────────────────────
const UploadService = {
  async upload(file) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const fakeUrl = e.target.result; // base64 como "S3 URL"
        setTimeout(() => resolve({ url: fakeUrl, name: file.name, size: file.size }), 400 + Math.random()*600);
      };
      reader.readAsDataURL(file);
    });
  },
};

// ═══════════════════════════════════════════════════════════════════
// I18N — 4 IDIOMAS
// ═══════════════════════════════════════════════════════════════════
const TRANSLATIONS = {

// HOOKS
// ═══════════════════════════════════════════════════════════════════
function useAuth() {
  const [token, setToken] = useState(() => localStorage.getItem('nova_token'));
  const [user, setUser] = useState(() => {
    const t = localStorage.getItem('nova_token');
    return t ? AuthService.me(t) : null;
  });

  const login = useCallback((email, password) => {
    const res = AuthService.login(email, password);
    if (res.error) return res;
    localStorage.setItem('nova_token', res.token);
    setToken(res.token);
    setUser(res.user);
    return res;
  }, []);

  const register = useCallback((name, email, password, lang) => {
    const res = AuthService.register(name, email, password, lang);
    if (res.error) return res;
    localStorage.setItem('nova_token', res.token);
    setToken(res.token);
    setUser(res.user);
    return res;
  }, []);

  const logout = useCallback(() => {
    localStorage.removeItem('nova_token');
    setToken(null);
    setUser(null);
  }, []);

  return { user, token, login, register, logout, isAdmin: user?.role === 'ADMIN' || user?.role === 'SUPER_ADMIN' };
}

function ToastContainer({ toasts }) {
  return (
    <div className="toast-container">
      {toasts.map(t => (
        <div key={t.id} className={`toast ${t.gold ? 'toast-gold' : ''}`}>
          <span className="toast-icon">{t.icon}</span>
          <span>{t.msg}</span>
        </div>
      ))}
    </div>
  );
}

// LANG SELECTOR
// ═══════════════════════════════════════════════════════════════════
function LangSelector({ lang, setLang }) {
  const langs = ['es','en','de','nl'];
  const flags = { es:'🇪🇸', en:'🇬🇧', de:'🇩🇪', nl:'🇳🇱' };
  return (
    <div className="lang-selector">
      {langs.map(l => (
        <button key={l} className={`lang-btn ${lang === l ? 'active' : ''}`} onClick={() => setLang(l)}>
          {flags[l]} {l.toUpperCase()}
        </button>
      ))}
    </div>
  );
}

  const [showUserMenu, setShowUserMenu] = useState(false);

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  return (
    <nav className={`navbar ${scrolled ? 'scrolled' : ''}`}>
      <div className="nav-logo" onClick={() => setPage('home')}>
        <div className="nav-logo-dot"/>

      </div>

        <button className={`nav-link ${page==='home'?'active':''}`} onClick={() => setPage('home')}>{t.nav.home}</button>

        {user?.role === 'ADMIN' || user?.role === 'SUPER_ADMIN' ? (
          <button className={`nav-link ${page==='admin'?'active':''}`} onClick={() => setPage('admin')} style={{color:'var(--gold)'}}>⚙ {t.nav.admin}</button>

      </div>
      <div style={{display:'flex',alignItems:'center',gap:'0.75rem'}}>
        <LangSelector lang={lang} setLang={setLang}/>
        <button className="nav-fav-btn" onClick={() => setPage('favs')}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill={favCount>0?'#C9A84C':'none'} stroke={favCount>0?'#C9A84C':'currentColor'} strokeWidth="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          {favCount > 0 && <span className="nav-fav-badge">{favCount}</span>}
        </button>
        {user ? (
          <div style={{position:'relative'}}>
            <button className="nav-user-btn" onClick={() => setShowUserMenu(m => !m)}>
              <div className="nav-avatar">{user.name.substring(0,2).toUpperCase()}</div>

              {notifCount > 0 && <span style={{background:'var(--gold)',color:'white',fontSize:9,width:16,height:16,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:500}}>{notifCount}</span>}

              <div style={{position:'absolute',right:0,top:'calc(100% + 8px)',background:'var(--cream)',border:'1px solid var(--border)',minWidth:180,zIndex:200,boxShadow:'var(--shadow-lg)'}}>
                <button className="nav-link" style={{display:'block',width:'100%',padding:'0.75rem 1rem',textAlign:'left',borderBottom:'1px solid var(--border)'}} onClick={() => { setPage('profile'); setShowUserMenu(false); }}>👤 {t.nav.profile}</button>
                <button className="nav-link" style={{display:'block',width:'100%',padding:'0.75rem 1rem',textAlign:'left',borderBottom:'1px solid var(--border)'}} onClick={() => { setPage('notifications'); setShowUserMenu(false); }}>🔔 Notificaciones {notifCount > 0 && `(${notifCount})`}</button>
                {(user.role==='ADMIN'||user.role==='SUPER_ADMIN') && <button className="nav-link" style={{display:'block',width:'100%',padding:'0.75rem 1rem',textAlign:'left',borderBottom:'1px solid var(--border)',color:'var(--gold)'}} onClick={() => { setPage('admin'); setShowUserMenu(false); }}>⚙ {t.nav.admin}</button>}
                <button className="nav-link" style={{display:'block',width:'100%',padding:'0.75rem 1rem',textAlign:'left',color:'var(--danger)'}} onClick={() => { logout(); setShowUserMenu(false); addToast({icon:'👋',msg:t.toast.logoutOk}); }}>↩ {t.nav.logout}</button>
              </div>
            )}
          </div>
        ) : (
          <button className="nav-cta" onClick={() => setPage('auth')}>{t.nav.login}</button>
        )}
      </div>
    </nav>
  );
}

    'linear-gradient(to right,#1a0f05,#2C2318,#3D2E1E,#4A3825,#5C4A35,#4A3825,#3D2E1E,#2C2318)',
    'linear-gradient(to right,#0f1a25,#1A2C3D,#253D52,#2C4A5C,#1A3548,#0f1a25,#1A2C3D,#253D52)',
    'linear-gradient(to right,#1a1a0f,#2C2C18,#3D3D2E,#4A4A3A,#3D3D2E,#2C2C18,#1a1a0f,#2C2C18)',
    'linear-gradient(to right,#0f1a0f,#1A2C1A,#253D25,#2C4A2C,#1A3A1A,#0f1a0f,#1A2C1A,#253D25)',
  ];
  const hotspots = [
    [{left:'20%',top:'45%',label:'Ventana'},{left:'55%',top:'55%',label:'Sofá'},{left:'80%',top:'40%',label:'TV'}],
    [{left:'25%',top:'50%',label:'Isla'},{left:'60%',top:'40%',label:'Horno'},{left:'75%',top:'55%',label:'Nevera'}],
    [{left:'30%',top:'60%',label:'Cama'},{left:'65%',top:'45%',label:'Armario'}],
    [{left:'40%',top:'50%',label:'Jacuzzi'},{left:'70%',top:'40%',label:'Ducha'}],
  ];
  const onMouseDown = e => { dragging.current=true; startX.current=e.clientX; startOff.current=offset; };
  const onMouseMove = e => { if(!dragging.current)return; setOffset(startOff.current+(e.clientX-startX.current)); };
  const onMouseUp = () => { dragging.current=false; };
  const onTouchStart = e => { dragging.current=true; startX.current=e.touches[0].clientX; startOff.current=offset; };
  const onTouchMove = e => { if(!dragging.current)return; setOffset(startOff.current+(e.touches[0].clientX-startX.current)); };
  return (
    <div className="tour-overlay">
      <div className="tour-header">
        <div>
          <div className="tour-title">{property.title}</div>
          <div style={{fontSize:12,color:'rgba(245,240,232,0.4)',letterSpacing:'0.1em',marginTop:4}}>TOUR VIRTUAL 360°</div>
        </div>
        <button className="tour-close" onClick={onClose}>✕</button>
      </div>
      <div className="tour-viewport" onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseUp} onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onMouseUp}>
        <div className="tour-panorama" style={{width:3000,background:roomColors[activeRoom%roomColors.length],left:offset%3000}}>
          <div style={{position:'absolute',inset:0,opacity:0.3,backgroundImage:"url(\"data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4z' fill='%23fff' fill-opacity='.03'/%3E%3C/svg%3E\")"}}/>
          <div style={{position:'absolute',bottom:'15%',left:'5%',right:'5%',height:'30%',background:'rgba(0,0,0,0.3)',borderRadius:2}}/>
          <div style={{position:'absolute',top:'30%',left:'10%',width:'25%',height:'40%',border:'1px solid rgba(255,255,255,0.05)'}}/>
          <div style={{position:'absolute',top:'25%',left:'45%',width:'20%',height:'45%',border:'1px solid rgba(255,255,255,0.04)'}}/>
        </div>
        <div style={{position:'absolute',inset:0,pointerEvents:'none'}}>
          {(hotspots[activeRoom%hotspots.length]||[]).map((h,i) => (
            <div key={i} className="tour-element" style={{left:h.left,top:h.top}}>
              <div className="tour-element-dot"/>
              <div className="tour-element-label">{h.label}</div>
            </div>
          ))}
        </div>
        <div className="tour-hint">← Arrastra para explorar →</div>
      </div>
      <div className="tour-rooms">
        {(property.rooms360||[]).map((r,i) => (
          <button key={i} className={`tour-room-btn ${activeRoom===i?'active':''}`} onClick={() => { setActiveRoom(i); setOffset(0); }}>{r}</button>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// VISIT MODAL
// ═══════════════════════════════════════════════════════════════════
function VisitModal({ property, onClose, addToast, t, user }) {
  const [success, setSuccess] = useState(false);
  const [form, setForm] = useState({ name: user?.name||'', email: user?.email||'', phone:'', date:'', time:'10:00' });
  const handleSubmit = e => {
    e.preventDefault();
    ContactService.submit({ ...form, propertyId: property.id, message:`Solicitud de visita para: ${property.title}`, tipo:'visita', language:'es' });
    setSuccess(true);
    addToast({ icon:'✅', msg: t.toast.visitOk, gold:true });
  };
  return (
    <div className="modal-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal">
        <button className="modal-close" onClick={onClose}>✕</button>
        {!success ? (
          <>
            <div className="modal-title">{t.visit.title}</div>
            <div className="modal-sub">{property.title}</div>
            <form onSubmit={handleSubmit}>
              <div className="modal-form-group"><label className="modal-label">{t.visit.name}</label><input className="modal-input" required value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder={t.visit.namePh}/></div>
              <div className="modal-form-group"><label className="modal-label">{t.visit.email}</label><input className="modal-input" type="email" required value={form.email} onChange={e=>setForm({...form,email:e.target.value})} placeholder="tu@email.com"/></div>
              <div className="modal-form-group"><label className="modal-label">{t.visit.phone}</label><input className="modal-input" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} placeholder={t.visit.phonePh}/></div>
              <div className="modal-dates">
                <div className="modal-form-group"><label className="modal-label">{t.visit.date}</label><input className="modal-input" type="date" required value={form.date} onChange={e=>setForm({...form,date:e.target.value})}/></div>
                <div className="modal-form-group"><label className="modal-label">{t.visit.time}</label><select className="modal-input" value={form.time} onChange={e=>setForm({...form,time:e.target.value})}>{['09:00','10:00','11:00','12:00','16:00','17:00','18:00'].map(h=><option key={h}>{h}</option>)}</select></div>
              </div>
              <button type="submit" className="modal-submit">{t.visit.confirm}</button>
            </form>
          </>
        ) : (
          <div className="modal-success">
            <div className="modal-success-icon">🎉</div>
            <div className="modal-success-title">{t.visit.successTitle}</div>
            <div className="modal-success-sub">{t.visit.successSub}</div>
            <button className="modal-submit" style={{marginTop:'2rem'}} onClick={onClose}>{t.visit.close}</button>
          </div>
        )}
      </div>
    </div>
  );
}

      <div className="card-img-wrap">
        {prop.imgs && prop.imgs[0] && (prop.imgs[0].startsWith('data:') || prop.imgs[0].startsWith('http')) ? (
          <img src={prop.imgs[0]} style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}} alt={prop.title}/>
        ) : (
          <div className="card-img-placeholder" style={{background:prop.bgColor}}><span>{prop.emojiBg}</span></div>

        <div className="card-price-sub">{prop.priceNote}</div>
        <div className="card-title">{prop.title}</div>
        <div className="card-location">📍 {prop.location}</div>
        <div className="card-details">

          <span>📐 {prop.m2} m²</span>

        </div>
      </div>
    </div>
  );
}

// DETAIL PAGE
// ═══════════════════════════════════════════════════════════════════
function DetailPage({ id, favs, toggleFav, setPage, addToast, t, user }) {
  const [prop, setProp] = useState(() => PropertyService.getById(id));
  const [imgIndex, setImgIndex] = useState(0);
  const [show360, setShow360] = useState(false);
  const [showVisit, setShowVisit] = useState(false);
  const isFav = favs.includes(prop?.id);

  useEffect(() => {
    const p = PropertyService.getById(id);
    if (p) { PropertyService.update(id, { views: (p.views||0)+1 }); setProp({...p, views:(p.views||0)+1}); }
  }, [id]);

  if (!prop) return null;
  const prevImg = () => setImgIndex(i => (i-1+prop.imgs.length)%prop.imgs.length);
  const nextImg = () => setImgIndex(i => (i+1)%prop.imgs.length);

  return (
    <div className="page">
      {show360 && <Tour360 property={prop} onClose={() => setShow360(false)}/>}
      {showVisit && <VisitModal property={prop} onClose={() => setShowVisit(false)} addToast={addToast} t={t} user={user}/>}
      <div className="detail-page">
        <button className="detail-back" onClick={() => setPage('catalogue')}>← {t.detail.back}</button>
        <div className="detail-grid">
          <div>
            <div className="gallery-main">
              <div className="gallery-main-img" style={{background:prop.bgColor}}>
                {prop.imgs[imgIndex] && (prop.imgs[imgIndex].startsWith('data:') || prop.imgs[imgIndex].startsWith('http')) ? (
                  <img src={prop.imgs[imgIndex]} style={{width:'100%',height:'100%',objectFit:'cover'}} alt={prop.title}/>
                ) : (
                  <span style={{fontSize:100}}>{prop.imgs[imgIndex]}</span>
                )}
              </div>
              <button className="gallery-nav gallery-prev" onClick={prevImg}>‹</button>
              <button className="gallery-nav gallery-next" onClick={nextImg}>›</button>
              <div className="gallery-counter">{imgIndex+1} / {prop.imgs.length}</div>
              {prop.has360 && <button className="gallery-360-btn" onClick={() => setShow360(true)}>⟳ Tour 360°</button>}
            </div>
            <div className="gallery-thumbs">
              {prop.imgs.map((img,i) => (
                <div key={i} className={`gallery-thumb ${imgIndex===i?'active':''}`} style={{background:prop.bgColor}} onClick={() => setImgIndex(i)}>
                  {img && (img.startsWith('data:') || img.startsWith('http')) ? (
                    <img src={img} style={{width:'100%',height:'100%',objectFit:'cover'}} alt=""/>
                  ) : (
                    <span>{img}</span>

                </div>
              ))}
            </div>
            <div style={{marginTop:'2rem'}}>
              <div className="detail-title">{prop.title}</div>
              <div className="detail-location">📍 {prop.location}</div>
              <div className="detail-features">
                <div className="detail-feature"><div className="detail-feature-icon">📐</div><div className="detail-feature-value">{prop.m2}</div><div className="detail-feature-label">{t.detail.meters}</div></div>
                <div className="detail-feature"><div className="detail-feature-icon">🛏</div><div className="detail-feature-value">{prop.hab}</div><div className="detail-feature-label">{t.detail.bedrooms}</div></div>
                <div className="detail-feature"><div className="detail-feature-icon">🚿</div><div className="detail-feature-value">{prop.banos}</div><div className="detail-feature-label">{t.detail.bathrooms}</div></div>
                <div className="detail-feature"><div className="detail-feature-icon">🏢</div><div className="detail-feature-value" style={{fontSize:14}}>{prop.planta}</div><div className="detail-feature-label">{t.detail.floor}</div></div>
              </div>
              <div className="detail-section-title">{t.detail.description}</div>
              <div className="detail-desc">{prop.desc}</div>
              <div className="detail-section-title">{t.detail.features}</div>
              <div className="amenities-grid">{prop.amenities.map((a,i) => <div key={i} className="amenity"><div className="amenity-check">✓</div>{a}</div>)}</div>

              <div className="detail-info-row"><span className="detail-info-label">{t.detail.meters}</span><span className="detail-info-value">{prop.m2} m²</span></div>
              <div className="detail-info-row"><span className="detail-info-label">{t.detail.bedrooms}</span><span className="detail-info-value">{prop.hab}</span></div>
              <div className="detail-info-row"><span className="detail-info-label">{t.detail.bathrooms}</span><span className="detail-info-value">{prop.banos}</span></div>
              <div className="detail-info-row"><span className="detail-info-label">{t.detail.floor}</span><span className="detail-info-value">{prop.planta}</span></div>
              <div className="detail-info-row"><span className="detail-info-label">{t.detail.garage}</span><span className="detail-info-value">{prop.parking?t.detail.included:t.detail.notIncluded}</span></div>
              <div className="detail-info-row"><span className="detail-info-label">{t.detail.ref}</span><span className="detail-info-value">NV-{String(prop.id).padStart(4,'0')}</span></div>
              <div className="detail-info-row"><span className="detail-info-label">👁 Visitas</span><span className="detail-info-value">{prop.views||0}</span></div>
            </div>
          </div>
        </div>
      </div>

  );

// FAVS PAGE

function FavsPage({ favs, toggleFav, setDetailId, setPage, addToast, t, user }) {
  const favProps = useMemo(() => PropertyService.list({}).filter(p => favs.includes(p.id)), [favs]);
  return (
    <div className="favs-page page">
      <div className="favs-title">{t.favs.title}</div>
      {favProps.length===0 ? (
        <div className="favs-empty">
          <div className="favs-empty-icon">💛</div>
          <div className="favs-empty-text">{t.favs.empty}</div>
          <div className="favs-empty-sub">{t.favs.emptySub}</div>
          <button className="btn-outline" onClick={() => setPage('catalogue')}>{t.favs.explore}</button>
        </div>
      ) : (
        <div className="properties-grid">
          {favProps.map((p,i) => <PropertyCard key={p.id} prop={p} favs={favs} toggleFav={toggleFav} setDetailId={setDetailId} setPage={setPage} addToast={addToast} index={i} t={t} user={user}/>)}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// AUTH PAGE
// ═══════════════════════════════════════════════════════════════════
function AuthPage({ login, register, setPage, addToast, t, lang }) {
  const [tab, setTab] = useState('login');
  const [form, setForm] = useState({name:'',email:'',password:''});
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handleSubmit = async e => {
    e.preventDefault();
    setError('');
    setLoading(true);
    await new Promise(r => setTimeout(r, 600)); // simular latencia de red
    if (tab === 'login') {
      const res = login(form.email, form.password);
      if (res.error) { setError(res.error); setLoading(false); return; }
      addToast({icon:'👋',msg:t.toast.loginOk,gold:true});
      setPage('home');
    } else {
      if (!form.name.trim()) { setError('El nombre es obligatorio'); setLoading(false); return; }
      const res = register(form.name, form.email, form.password, lang);
      if (res.error) { setError(res.error); setLoading(false); return; }
      addToast({icon:'🎉',msg:t.toast.registerOk,gold:true});
      setPage('home');
    }
    setLoading(false);
  };

  return (
    <div className="page auth-page">
      <div className="auth-card">
        <div className="auth-title">{t.auth.title}</div>
        <div className="auth-sub">{t.auth.sub}</div>
        <div className="auth-tabs">
          <button className={`auth-tab ${tab==='login'?'active':''}`} onClick={() => { setTab('login'); setError(''); }}>{t.auth.login}</button>
          <button className={`auth-tab ${tab==='register'?'active':''}`} onClick={() => { setTab('register'); setError(''); }}>{t.auth.register}</button>
        </div>
        {error && <div className="modal-error">⚠ {error}</div>}
        <form onSubmit={handleSubmit}>
          {tab==='register' && (
            <div className="modal-form-group"><label className="modal-label">{t.auth.name}</label><input className="modal-input" required value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Elena García"/></div>
          )}
          <div className="modal-form-group"><label className="modal-label">{t.auth.email}</label><input className="modal-input" type="email" required value={form.email} onChange={e=>setForm({...form,email:e.target.value})} placeholder="tu@email.com"/></div>
          <div className="modal-form-group"><label className="modal-label">{t.auth.password}</label><input className="modal-input" type="password" required value={form.password} onChange={e=>setForm({...form,password:e.target.value})} placeholder="••••••••"/></div>
          <button type="submit" className="modal-submit" disabled={loading} style={{opacity:loading?0.7:1}}>
            {loading ? '⏳ Cargando...' : tab==='login' ? t.auth.loginBtn : t.auth.registerBtn}
          </button>
        </form>
        <div className="auth-divider"><span>o</span></div>
        <button className="btn-google" onClick={() => { addToast({icon:'🔗',msg:'OAuth Google — requiere backend real'}); }}>
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          {t.auth.withGoogle}
        </button>
        <div style={{marginTop:'1.5rem',textAlign:'center',fontSize:13,color:'var(--warm-gray)'}}>
          {tab==='login' ? (
            <>{t.auth.noAccount} <button style={{background:'none',border:'none',cursor:'pointer',color:'var(--dark)',fontWeight:500,textDecoration:'underline',fontFamily:'var(--font-sans)',fontSize:13}} onClick={() => setTab('register')}>{t.auth.register}</button></>
          ) : (
            <>{t.auth.alreadyHave} <button style={{background:'none',border:'none',cursor:'pointer',color:'var(--dark)',fontWeight:500,textDecoration:'underline',fontFamily:'var(--font-sans)',fontSize:13}} onClick={() => setTab('login')}>{t.auth.login}</button></>
          )}
        </div>
        <div style={{marginTop:'1.5rem',padding:'1rem',background:'rgba(201,168,76,0.08)',border:'1px solid rgba(201,168,76,0.2)',fontSize:12,color:'var(--warm-gray)'}}>
          <strong style={{color:'var(--dark)'}}>Demo:</strong> admin@nova.com / admin123 · elena@nova.com / agent123 · james@gmail.com / user123
        </div>
      </div>
    </div>
  );
}

// PROFILE PAGE
// ═══════════════════════════════════════════════════════════════════
function ProfilePage({ user, setPage, addToast }) {
  const contacts = useMemo(() => ContactService.list().filter(c => c.email === user.email), [user]);
  const [form, setForm] = useState({ name: user.name, email: user.email });
  const handleSave = () => {
    const users = DB.get('users');
    DB.set('users', users.map(u => u.id === user.id ? { ...u, ...form } : u));
    addToast({ icon:'✅', msg:'Perfil actualizado', gold:true });
  };
  return (
    <div className="profile-page page">
      <div className="profile-header">
        <div className="profile-avatar-lg">{user.name.substring(0,2).toUpperCase()}</div>
        <div>
          <div className="profile-name">{user.name}</div>
          <div className="profile-email">{user.email}</div>
          <div className="profile-role">{user.role}</div>
        </div>
      </div>
      <div className="profile-grid">
        <div>
          <div className="profile-section-title">Datos personales</div>
          <div className="admin-form">
            <div className="admin-form-group"><label className="admin-form-label">Nombre</label><input className="admin-form-input" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/></div>
            <div className="admin-form-group"><label className="admin-form-label">Email</label><input className="admin-form-input" type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})}/></div>
            <div className="admin-form-group"><label className="admin-form-label">Nueva contraseña</label><input className="admin-form-input" type="password" placeholder="Dejar vacío para no cambiar"/></div>
            <button className="admin-btn" onClick={handleSave}>Guardar cambios</button>
          </div>
        </div>
        <div>
          <div className="profile-section-title">Mis solicitudes ({contacts.length})</div>
          {contacts.length === 0 ? <div style={{color:'var(--warm-gray)',fontSize:14}}>No has enviado ninguna solicitud aún.</div> : (
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {contacts.map(c => (
                <div key={c.id} style={{background:'var(--card-bg)',border:'1px solid var(--border)',padding:'0.85rem 1rem',fontSize:13}}>
                  <div style={{fontWeight:500,marginBottom:4}}>{c.message.substring(0,60)}...</div>
                  <div style={{fontSize:11,color:'var(--warm-gray)'}}>{new Date(c.createdAt).toLocaleDateString()} · <span className={`status-badge status-${c.status.toLowerCase()}`}>{c.status}</span></div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// NOTIFICATIONS PAGE
// ═══════════════════════════════════════════════════════════════════
function NotificationsPage({ user, onNotifRead }) {
  const [notifs, setNotifs] = useState(() => NotifService.list(user.id));
  const markAll = () => { NotifService.markAllRead(user.id); setNotifs(NotifService.list(user.id)); onNotifRead(); };
  const mark = id => { NotifService.markRead(id); setNotifs(NotifService.list(user.id)); onNotifRead(); };
  const icons = { new_contact:'📩', system:'🔔', welcome:'🎉', property:'🏠' };
  return (
    <div className="profile-page page">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'2rem'}}>
        <div style={{fontFamily:'var(--font-serif)',fontSize:36,fontWeight:300}}>Notificaciones</div>
        {notifs.some(n=>!n.read) && <button className="admin-btn admin-btn-outline" onClick={markAll}>Marcar todas como leídas</button>}
      </div>
      {notifs.length===0 ? <div style={{textAlign:'center',padding:'4rem',color:'var(--warm-gray)',fontSize:14}}>No tienes notificaciones</div> : (
        <div className="notif-list">
          {notifs.map(n => (
            <div key={n.id} className={`notif-item ${!n.read?'unread':''}`} onClick={() => mark(n.id)} style={{cursor:'pointer'}}>
              <div className="notif-icon">{icons[n.type]||'🔔'}</div>
              <div className="notif-body">
                <div className="notif-title">{n.title}</div>
                <div className="notif-msg">{n.message}</div>
                <div className="notif-time">{new Date(n.createdAt).toLocaleString()}</div>
              </div>
              {!n.read && <div style={{width:8,height:8,borderRadius:'50%',background:'var(--gold)',flexShrink:0,marginTop:6}}/>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ADMIN PANEL
// ═══════════════════════════════════════════════════════════════════
function AdminPanel({ user, setPage, addToast }) {
  const [section, setSection] = useState('dashboard');
  const [properties, setProperties] = useState(() => PropertyService.list({}));
  const [contacts, setContacts] = useState(() => ContactService.list());
  const [users, setUsers] = useState(() => DB.get('users').map(({password:_,...u})=>u));
  const [editProp, setEditProp] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [propForm, setPropForm] = useState({ title:'', tipo:'venta', price:'', m2:'', hab:'', banos:'', location:'', district:'', desc:'', emojiBg:'🏠', bgColor:'#2C2318', planta:'', parking:false, badge:'venta', has360:false, imgs:['🏠'], rooms360:[], amenities:[], status:'ACTIVE', featured:false, nuevo:false, priceNote:'Precio de venta', priceLabel:'' });
  const [uploadedImgs, setUploadedImgs] = useState([]);
  const [uploading, setUploading] = useState(false);
  const [searchContacts, setSearchContacts] = useState('');

  const refresh = () => {
    setProperties(PropertyService.list({}));
    setContacts(ContactService.list());
    setUsers(DB.get('users').map(({password:_,...u})=>u));
  };

  const stats = useMemo(() => {
    const props = PropertyService.list({});
    const contacts = ContactService.list();
    return {
      totalProps: props.length,
      activeProps: props.filter(p=>p.status==='ACTIVE').length,
      totalViews: props.reduce((a,p) => a+(p.views||0), 0),
      pendingContacts: contacts.filter(c=>c.status==='PENDING').length,
      totalContacts: contacts.length,
      totalUsers: DB.get('users').length,
      avgPrice: Math.round(props.filter(p=>p.tipo==='venta').reduce((a,p)=>a+p.price,0)/Math.max(props.filter(p=>p.tipo==='venta').length,1)),
    };
  }, [section]);

  const handleDeleteProp = id => {
    if(!confirm('¿Eliminar esta propiedad?')) return;
    PropertyService.delete(id);
    refresh();
    addToast({icon:'🗑️',msg:'Propiedad eliminada'});
  };

  const handleEditProp = prop => {
    setPropForm({...prop, price:String(prop.price), m2:String(prop.m2), hab:String(prop.hab), banos:String(prop.banos), imgs: prop.imgs||['🏠'], amenities: prop.amenities||[], rooms360: prop.rooms360||[]});
    setUploadedImgs([]);
    setEditProp(prop);
    setShowForm(true);
  };

  const handleNewProp = () => {
    setPropForm({ title:'', tipo:'venta', price:'', m2:'', hab:'', banos:'', location:'', district:'', desc:'', emojiBg:'🏠', bgColor:'#2C2318', planta:'', parking:false, badge:'venta', has360:false, imgs:['🏠'], rooms360:[], amenities:[], status:'ACTIVE', featured:false, nuevo:false, priceNote:'Precio de venta', priceLabel:'' });
    setUploadedImgs([]);
    setEditProp(null);
    setShowForm(true);
  };

  const handleSaveProp = () => {
    const imgs = uploadedImgs.length > 0 ? uploadedImgs.map(i => i.url) : propForm.imgs;
    const data = {
      ...propForm,
      price: Number(propForm.price),
      m2: Number(propForm.m2),
      hab: Number(propForm.hab),
      banos: Number(propForm.banos),
      priceLabel: `${Number(propForm.price).toLocaleString('es-ES')} €${propForm.tipo==='alquiler'?'/mes':''}`,
      imgs: imgs,
      emojiBg: uploadedImgs.length > 0 ? '📷' : propForm.emojiBg,
    };
    if (!data.title || !data.price || !data.location) { addToast({icon:'⚠️',msg:'Rellena los campos obligatorios'}); return; }
    if (editProp) { PropertyService.update(editProp.id, data); addToast({icon:'✅',msg:'Propiedad actualizada',gold:true}); }
    else { PropertyService.create(data); addToast({icon:'✅',msg:'Propiedad creada',gold:true}); }
    setShowForm(false); refresh();
  };

  const handleFileUpload = async files => {
    setUploading(true);
    const results = await Promise.all(Array.from(files).map(f => UploadService.upload(f)));
    setUploadedImgs(prev => [...prev, ...results]);
    addToast({icon:'📸',msg:`${results.length} imagen(es) subida(s)`,gold:true});
    setUploading(false);
  };

  const filteredContacts = useMemo(() => contacts.filter(c =>
    c.name.toLowerCase().includes(searchContacts.toLowerCase()) ||
    c.email.toLowerCase().includes(searchContacts.toLowerCase())
  ), [contacts, searchContacts]);

  const navItems = [
    { id:'dashboard', icon:'📊', label:'Dashboard' },
    { id:'properties', icon:'🏠', label:'Viviendas' },
    { id:'contacts', icon:'📩', label:'Contactos/Reservas' },
    { id:'users', icon:'👥', label:'Usuarios' },
    { id:'notifications', icon:'🔔', label:'Notificaciones' },
  ];

  return (
    <div className="page" style={{paddingTop:68}}>
      {showForm && (
        <div className="modal-overlay" onClick={e => e.target===e.currentTarget && setShowForm(false)}>
          <div className="modal" style={{maxWidth:700}}>
            <button className="modal-close" onClick={() => setShowForm(false)}>✕</button>
            <div className="modal-title">{editProp ? 'Editar propiedad' : 'Nueva propiedad'}</div>
            <div className="modal-sub" style={{marginBottom:'1.5rem'}}>Completa los datos del inmueble</div>
            <div className="admin-form">
              <div className="admin-form-row">
                <div className="admin-form-group"><label className="admin-form-label">Título *</label><input className="admin-form-input" value={propForm.title} onChange={e=>setPropForm({...propForm,title:e.target.value})} placeholder="Ático de lujo..."/></div>
                <div className="admin-form-group"><label className="admin-form-label">Tipo *</label><select className="admin-form-input" value={propForm.tipo} onChange={e=>setPropForm({...propForm,tipo:e.target.value,badge:e.target.value,priceNote:e.target.value==='venta'?'Precio de venta':'Mensual'})}><option value="venta">Venta</option><option value="alquiler">Alquiler</option></select></div>
              </div>
              <div className="admin-form-row">
                <div className="admin-form-group"><label className="admin-form-label">Precio (€) *</label><input className="admin-form-input" type="number" value={propForm.price} onChange={e=>setPropForm({...propForm,price:e.target.value})} placeholder="350000"/></div>
                <div className="admin-form-group"><label className="admin-form-label">M² *</label><input className="admin-form-input" type="number" value={propForm.m2} onChange={e=>setPropForm({...propForm,m2:e.target.value})} placeholder="120"/></div>
              </div>
              <div className="admin-form-row">
                <div className="admin-form-group"><label className="admin-form-label">Habitaciones</label><input className="admin-form-input" type="number" value={propForm.hab} onChange={e=>setPropForm({...propForm,hab:e.target.value})} placeholder="3"/></div>
                <div className="admin-form-group"><label className="admin-form-label">Baños</label><input className="admin-form-input" type="number" value={propForm.banos} onChange={e=>setPropForm({...propForm,banos:e.target.value})} placeholder="2"/></div>
              </div>
              <div className="admin-form-row">
                <div className="admin-form-group"><label className="admin-form-label">Ubicación *</label><input className="admin-form-input" value={propForm.location} onChange={e=>setPropForm({...propForm,location:e.target.value})} placeholder="Gran Vía, Valencia"/></div>
                <div className="admin-form-group"><label className="admin-form-label">Zona</label><input className="admin-form-input" value={propForm.district} onChange={e=>setPropForm({...propForm,district:e.target.value})} placeholder="Ej: Marbella, Costa del Sol..."/></div>
              </div>
              <div className="admin-form-row">
                <div className="admin-form-group"><label className="admin-form-label">Planta</label><input className="admin-form-input" value={propForm.planta} onChange={e=>setPropForm({...propForm,planta:e.target.value})} placeholder="3ª"/></div>
                <div className="admin-form-group"><label className="admin-form-label">Estado</label><select className="admin-form-input" value={propForm.status} onChange={e=>setPropForm({...propForm,status:e.target.value})}><option value="ACTIVE">Activo</option><option value="SOLD">Vendido</option><option value="INACTIVE">Inactivo</option></select></div>
              </div>

                  <input id="fileInput" type="file" accept="image/*" multiple onChange={e=>handleFileUpload(e.target.files)}/>

                  <div className="upload-preview">

                <button className="admin-btn admin-btn-outline" onClick={() => setShowForm(false)}>Cancelar</button>
              </div>
            </div>
          </div>
        </div>

          </div>
          <div className="admin-sidebar-title">Panel</div>
          {navItems.map(item => (
            <button key={item.id} className={`admin-nav-item ${section===item.id?'active':''}`} onClick={() => setSection(item.id)}>
              <span style={{fontSize:16}}>{item.icon}</span>{item.label}

          ))}
          <div style={{flex:1}}/>
          <button className="admin-nav-item" onClick={() => setPage('home')}>← Volver a la web</button>
